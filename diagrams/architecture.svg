<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #1a1d24; }
    .title { font-weight: 700; font-size: 22px; fill: #1a1d24; }
    .ttl { font-weight: 700; font-size: 14px; fill: #1a1d24; }
    .sub { font-size: 12px; fill: #5a626e; }
    .edge { font-size: 12px; fill: #3a3f47; }
    .grp { font-weight: 700; font-size: 13px; letter-spacing: 1.2px; fill: #6a6f78; }
    .conn { fill: none; stroke: #5a626e; stroke-width: 1.6; }
  </style>
  <title id="title">BomberMen-X System Architecture</title>
  <desc id="desc">Three-tier architecture: clients on the left, shared bomberman-core in the middle, Netty server on the right, Postgres and Redis at the bottom.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#5a626e"/></marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%"><feDropShadow stdDeviation="1" dx="0" dy="1" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Card on paper -->
  <rect x="0" y="0" width="1400" height="880" fill="#ffffff"/>
  <rect x="24" y="24" width="1352" height="832" rx="10" fill="#fdfdfb" stroke="#d6dae0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="60" y="68" class="title">BomberMen-X — System Architecture</text>
  <text x="60" y="92" class="sub">Three-tier real-time multiplayer · Client tier · Shared core · Server tier · Data tier</text>

  <!-- ============ CLIENT TIER (left column) ============ -->
  <rect x="60" y="120" width="320" height="600" rx="8" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.6" filter="url(#sh)"/>
  <text x="220" y="148" text-anchor="middle" class="grp">CLIENT TIER</text>

  <rect x="80" y="180" width="280" height="160" rx="8" fill="#ffffff" stroke="#0b8a78" stroke-width="1.4" filter="url(#sh)"/>
  <text x="220" y="206" text-anchor="middle" class="ttl">JavaFX Desktop Client</text>
  <line x1="100" y1="218" x2="340" y2="218" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="240" class="sub">ClientLauncher · SceneRouter</text>
  <text x="100" y="260" class="sub">MainMenuView · LobbyView</text>
  <text x="100" y="280" class="sub">ArenaView · ArenaRenderer</text>
  <text x="100" y="300" class="sub">HudOverlay · RankingsView</text>
  <text x="100" y="320" class="sub">GameClient (WS transport)</text>

  <rect x="80" y="360" width="280" height="160" rx="8" fill="#ffffff" stroke="#0b8a78" stroke-width="1.4" filter="url(#sh)"/>
  <text x="220" y="386" text-anchor="middle" class="ttl">Web HTML Client</text>
  <line x1="100" y1="398" x2="340" y2="398" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="420" class="sub">Canvas 2D renderer</text>
  <text x="100" y="440" class="sub">DOM lobby + chat panes</text>
  <text x="100" y="460" class="sub">WebSocket bridge (wss://)</text>
  <text x="100" y="480" class="sub">Mobile-friendly viewport</text>
  <text x="100" y="500" class="sub">Spectator entry</text>

  <rect x="80" y="540" width="280" height="160" rx="8" fill="#ffffff" stroke="#0b8a78" stroke-width="1.4" stroke-dasharray="6 4" filter="url(#sh)"/>
  <text x="220" y="566" text-anchor="middle" class="ttl">3D Spectator (deferred)</text>
  <line x1="100" y1="578" x2="340" y2="578" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="600" class="sub">JavaFX 3D scene-graph</text>
  <text x="100" y="620" class="sub">Read-only snapshot stream</text>
  <text x="100" y="640" class="sub">Free-fly camera + replay</text>
  <text x="100" y="660" class="sub">Re-uses WorldSnapshot DTOs</text>
  <text x="100" y="680" class="sub">Planned, not in v1.0</text>

  <!-- ============ SHARED CORE (center column) ============ -->
  <rect x="500" y="180" width="280" height="540" rx="8" fill="#e3f1fa" stroke="#1565c0" stroke-width="1.6" filter="url(#sh)"/>
  <text x="640" y="208" text-anchor="middle" class="grp">SHARED CORE  (bomberman-core)</text>

  <rect x="520" y="240" width="240" height="140" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="640" y="264" text-anchor="middle" class="ttl">Domain entities</text>
  <line x1="540" y1="276" x2="740" y2="276" stroke="#d6dae0" stroke-width="1"/>
  <text x="540" y="298" class="sub">Bomberman · Player · Bomb</text>
  <text x="540" y="318" class="sub">Explosion · Score · Arena</text>
  <text x="540" y="338" class="sub">Tile · Bonus + 7 subclasses</text>
  <text x="540" y="358" class="sub">GameState · GameMode</text>

  <rect x="520" y="400" width="240" height="140" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="640" y="424" text-anchor="middle" class="ttl">Wire / DTO</text>
  <line x1="540" y1="436" x2="740" y2="436" stroke="#d6dae0" stroke-width="1"/>
  <text x="540" y="458" class="sub">Envelope · WireCodec</text>
  <text x="540" y="478" class="sub">MessageType · WorldSnapshot</text>
  <text x="540" y="498" class="sub">PlayerSnapshot · BombSnapshot</text>
  <text x="540" y="518" class="sub">MatchStart · MatchEnd</text>

  <rect x="520" y="560" width="240" height="140" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="640" y="584" text-anchor="middle" class="ttl">Simulation</text>
  <line x1="540" y1="596" x2="740" y2="596" stroke="#d6dae0" stroke-width="1"/>
  <text x="540" y="618" class="sub">GameWorld (authoritative)</text>
  <text x="540" y="638" class="sub">Snapshotter · TickClock</text>
  <text x="540" y="658" class="sub">CollisionResolver</text>
  <text x="540" y="678" class="sub">Deterministic, no I/O</text>

  <!-- ============ SERVER TIER (right column) ============ -->
  <rect x="900" y="120" width="440" height="600" rx="8" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="1120" y="148" text-anchor="middle" class="grp">SERVER TIER  (bomberman-server)</text>

  <rect x="920" y="180" width="200" height="120" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1020" y="204" text-anchor="middle" class="ttl">Netty Edge</text>
  <line x1="940" y1="216" x2="1100" y2="216" stroke="#d6dae0" stroke-width="1"/>
  <text x="940" y="238" class="sub">GameServer</text>
  <text x="940" y="256" class="sub">WebSocketServer</text>
  <text x="940" y="274" class="sub">GameServerHandler</text>
  <text x="940" y="292" class="sub">TLS · wss://</text>

  <rect x="1140" y="180" width="180" height="120" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1230" y="204" text-anchor="middle" class="ttl">Lobby + Auth</text>
  <line x1="1160" y1="216" x2="1300" y2="216" stroke="#d6dae0" stroke-width="1"/>
  <text x="1160" y="238" class="sub">LobbyService</text>
  <text x="1160" y="256" class="sub">AuthRegistry</text>
  <text x="1160" y="274" class="sub">SessionRegistry</text>
  <text x="1160" y="292" class="sub">ClientSession</text>

  <rect x="920" y="340" width="200" height="120" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1020" y="364" text-anchor="middle" class="ttl">MatchManager</text>
  <line x1="940" y1="376" x2="1100" y2="376" stroke="#d6dae0" stroke-width="1"/>
  <text x="940" y="398" class="sub">Pairs queued players</text>
  <text x="940" y="416" class="sub">Creates MatchSession</text>
  <text x="940" y="434" class="sub">Tracks active matches</text>
  <text x="940" y="452" class="sub">Disposes finished</text>

  <rect x="1140" y="340" width="180" height="120" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1230" y="364" text-anchor="middle" class="ttl">MatchSession</text>
  <line x1="1160" y1="376" x2="1300" y2="376" stroke="#d6dae0" stroke-width="1"/>
  <text x="1160" y="398" class="sub">Owns GameWorld</text>
  <text x="1160" y="416" class="sub">20 Hz tick loop</text>
  <text x="1160" y="434" class="sub">Broadcasts snapshots</text>
  <text x="1160" y="452" class="sub">Applies inputs</text>

  <rect x="920" y="500" width="200" height="120" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1020" y="524" text-anchor="middle" class="ttl">Chat + Bots</text>
  <line x1="940" y1="536" x2="1100" y2="536" stroke="#d6dae0" stroke-width="1"/>
  <text x="940" y="558" class="sub">ChatRouter</text>
  <text x="940" y="576" class="sub">ProfanityFilter</text>
  <text x="940" y="594" class="sub">BotController (AI)</text>
  <text x="940" y="612" class="sub">Same input pipeline</text>

  <rect x="1140" y="500" width="180" height="120" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1230" y="524" text-anchor="middle" class="ttl">Ops / Metrics</text>
  <line x1="1160" y1="536" x2="1300" y2="536" stroke="#d6dae0" stroke-width="1"/>
  <text x="1160" y="558" class="sub">Micrometer</text>
  <text x="1160" y="576" class="sub">Tick budget gauge</text>
  <text x="1160" y="594" class="sub">/health · /ready</text>
  <text x="1160" y="612" class="sub">JSON logs</text>

  <!-- ============ DATA TIER (bottom) ============ -->
  <rect x="60" y="760" width="640" height="80" rx="8" fill="#fff5dc" stroke="#b8860b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="380" y="786" text-anchor="middle" class="grp">DATA TIER</text>
  <rect x="80" y="800" width="280" height="30" rx="6" fill="#ffffff" stroke="#b8860b" stroke-width="1.2"/>
  <text x="220" y="820" text-anchor="middle" class="ttl">PostgreSQL · accounts · history</text>
  <rect x="380" y="800" width="300" height="30" rx="6" fill="#ffffff" stroke="#b8860b" stroke-width="1.2"/>
  <text x="530" y="820" text-anchor="middle" class="ttl">Redis · sessions · queue · cache</text>

  <!-- ============ BUILD + OPS (bottom right) ============ -->
  <rect x="740" y="760" width="600" height="80" rx="8" fill="#fff9e6" stroke="#9c7c20" stroke-width="1.6" filter="url(#sh)"/>
  <text x="1040" y="786" text-anchor="middle" class="grp">BUILD + OPS</text>
  <rect x="760" y="800" width="180" height="30" rx="6" fill="#ffffff" stroke="#9c7c20" stroke-width="1.2"/>
  <text x="850" y="820" text-anchor="middle" class="ttl">Maven 3 multi-module</text>
  <rect x="960" y="800" width="180" height="30" rx="6" fill="#ffffff" stroke="#9c7c20" stroke-width="1.2"/>
  <text x="1050" y="820" text-anchor="middle" class="ttl">JDK 17 (Red Hat)</text>
  <rect x="1160" y="800" width="160" height="30" rx="6" fill="#ffffff" stroke="#9c7c20" stroke-width="1.2"/>
  <text x="1240" y="820" text-anchor="middle" class="ttl">Docker · GH Actions</text>

  <!-- ============ CONNECTORS — orthogonal only ============ -->
  <!-- Client tier (right edge x=380) → Shared core (left edge x=500) -->
  <!-- JavaFX → Domain at y=260 -->
  <path class="conn" d="M 380,260 H 500" marker-end="url(#arr)"/>
  <rect x="416" y="240" width="68" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="450" y="252" text-anchor="middle" class="edge">imports</text>

  <!-- Web → Wire at y=440 -->
  <path class="conn" d="M 380,440 H 500" marker-end="url(#arr)"/>
  <rect x="412" y="420" width="76" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="450" y="432" text-anchor="middle" class="edge">DTO + codec</text>

  <!-- 3D Spectator → Sim at y=620 -->
  <path class="conn" d="M 380,620 H 500" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <rect x="412" y="600" width="76" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="450" y="612" text-anchor="middle" class="edge">read-only DTO</text>

  <!-- Shared core (right edge x=780) → Server tier (left edge x=900) -->
  <!-- Domain → MatchManager (route 780→820→400→900) -->
  <path class="conn" d="M 780,310 H 840 V 400 H 900" marker-end="url(#arr)"/>
  <rect x="800" y="358" width="100" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="850" y="370" text-anchor="middle" class="edge">domain reused</text>

  <!-- Wire → Netty Edge (route 780→860→240→900) -->
  <path class="conn" d="M 780,470 H 860 V 240 H 900" marker-end="url(#arr)"/>
  <rect x="828" y="222" width="64" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="860" y="234" text-anchor="middle" class="edge">snapshots</text>

  <!-- Sim → MatchSession (route 780→840→400→1140) -->
  <path class="conn" d="M 780,630 H 840 V 540 H 1140" marker-end="url(#arr)"/>
  <rect x="980" y="522" width="86" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1023" y="534" text-anchor="middle" class="edge">GameWorld</text>

  <!-- Server internal: Netty Edge → MatchManager (down) -->
  <path class="conn" d="M 1020,300 V 340" marker-end="url(#arr)"/>
  <rect x="1024" y="312" width="80" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1064" y="324" text-anchor="middle" class="edge">route frames</text>

  <!-- Lobby+Auth → MatchManager (down + left) -->
  <path class="conn" d="M 1230,300 V 320 H 1020 V 340" marker-end="url(#arr)"/>
  <rect x="1100" y="302" width="84" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1142" y="314" text-anchor="middle" class="edge">create match</text>

  <!-- MatchManager → MatchSession (right) -->
  <path class="conn" d="M 1120,400 H 1140" marker-end="url(#arr)"/>

  <!-- MatchSession → Chat+Bots (down + left) -->
  <path class="conn" d="M 1230,460 V 480 H 1020 V 500" marker-end="url(#arr)"/>
  <rect x="1090" y="462" width="84" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1132" y="474" text-anchor="middle" class="edge">broadcast</text>

  <!-- MatchSession → Metrics (down) -->
  <path class="conn" d="M 1230,460 V 500" marker-end="url(#arr)"/>

  <!-- Server (Netty Edge) → Postgres (down-left, trunk at y=740) -->
  <path class="conn" d="M 940,300 V 740 H 220 V 800" marker-end="url(#arr)"/>
  <rect x="540" y="722" width="160" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="620" y="734" text-anchor="middle" class="edge">JDBC · accounts/history</text>

  <!-- Server (Lobby+Auth) → Redis (down-left, trunk at y=750) -->
  <path class="conn" d="M 1180,300 V 750 H 530 V 800" marker-end="url(#arr)"/>
  <rect x="800" y="732" width="120" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="860" y="744" text-anchor="middle" class="edge">sessions · queue</text>

  <!-- Client → Netty (the actual WS link via top trunk at y=104) -->
  <path class="conn" d="M 220,180 V 104 H 1020 V 180" marker-end="url(#arr)"/>
  <rect x="540" y="86" width="280" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="680" y="98" text-anchor="middle" class="edge">WebSocket  wss://  20 Hz</text>
</svg>
