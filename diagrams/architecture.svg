<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 940" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <style>
    rect { rx: 6; ry: 6; }
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #e8eef8; }
    .ttl { font-weight: 700; font-size: 14px; }
    .sub { font-size: 12px; fill: #9aa6b8; }
    .edge { font-size: 11px; fill: #c5cbd6; }
  </style>
  <title id="title">BomberMen-X System Architecture</title>
  <desc id="desc">Three-tier architecture: clients on the left, shared bomberman-core in the middle, Netty server on the right, Postgres and Redis sidecars below.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2533" stroke-width="0.5"/>
    </pattern>
    <marker id="arrCyan" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#3aedff"/></marker>
    <marker id="arrPink" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#ff3ad9"/></marker>
    <marker id="arrAmber" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#ffb53a"/></marker>
    <marker id="arrGreen" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#3affb5"/></marker>
  </defs>
  <style>
    text { fill: #e6eef8; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .title { font-weight: 700; font-size: 22px; }
    .ttl { font-weight: 700; font-size: 14px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; paint-order: stroke; stroke: #08090d; stroke-width: 3px; stroke-linejoin: round; }
    .conn { fill: none; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="1500" height="940" fill="#08090d"/>
  <rect x="0" y="0" width="1500" height="940" fill="url(#grid)"/>

  <text x="40" y="42" class="title" fill="#daa520">BomberMen-X — System Architecture</text>
  <text x="40" y="64" class="sub">Three-tier real-time multiplayer · Client tier · Shared core · Server tier · Postgres + Redis sidecars</text>

  <!-- ============ CLIENT TIER ============ -->
  <rect x="40" y="100" width="340" height="620" rx="14" fill="#11141c" stroke="#3affb5" stroke-width="2"/>
  <text x="210" y="130" text-anchor="middle" class="ttl" fill="#3affb5">CLIENT TIER  (vāyu · air)</text>
  <text x="210" y="148" text-anchor="middle" class="sub">Rendering · Input · UX</text>

  <!-- JavaFX Desktop -->
  <rect x="70" y="170" width="280" height="160" rx="10" fill="#0d2823" stroke="#3affb5" stroke-width="1.6"/>
  <text x="210" y="194" text-anchor="middle" class="ttl" fill="#3affb5">JavaFX Desktop Client</text>
  <line x1="82" y1="204" x2="338" y2="204" stroke="#3affb5" stroke-width="0.8" opacity="0.6"/>
  <text x="86" y="224" class="sub">ClientLauncher · SceneRouter</text>
  <text x="86" y="242" class="sub">MainMenuView · LobbyView</text>
  <text x="86" y="260" class="sub">ArenaView · ArenaRenderer</text>
  <text x="86" y="278" class="sub">HudOverlay · RankingsView</text>
  <text x="86" y="296" class="sub">MandalaArt · MandalaTheme</text>
  <text x="86" y="314" class="sub">GameClient (WS transport)</text>

  <!-- Web HTML Client -->
  <rect x="70" y="360" width="280" height="160" rx="10" fill="#0d2823" stroke="#3affb5" stroke-width="1.6"/>
  <text x="210" y="384" text-anchor="middle" class="ttl" fill="#3affb5">Web HTML Client</text>
  <line x1="82" y1="394" x2="338" y2="394" stroke="#3affb5" stroke-width="0.8" opacity="0.6"/>
  <text x="86" y="414" class="sub">Canvas 2D renderer</text>
  <text x="86" y="432" class="sub">DOM lobby + chat panes</text>
  <text x="86" y="450" class="sub">WebSocket bridge (wss://)</text>
  <text x="86" y="468" class="sub">Same MessageType envelopes</text>
  <text x="86" y="486" class="sub">Mobile-friendly viewport</text>
  <text x="86" y="504" class="sub">Spectator / quick-play entry</text>

  <!-- 3D Spectator -->
  <rect x="70" y="550" width="280" height="150" rx="10" fill="#0d2823" stroke="#3affb5" stroke-width="1.6" stroke-dasharray="6 4" opacity="0.85"/>
  <text x="210" y="574" text-anchor="middle" class="ttl" fill="#3affb5">3D Spectator (deferred)</text>
  <line x1="82" y1="584" x2="338" y2="584" stroke="#3affb5" stroke-width="0.8" opacity="0.6"/>
  <text x="86" y="604" class="sub">JavaFX 3D scene-graph</text>
  <text x="86" y="622" class="sub">Read-only snapshot stream</text>
  <text x="86" y="640" class="sub">Free-fly camera + replay</text>
  <text x="86" y="658" class="sub">Re-uses WorldSnapshot DTOs</text>
  <text x="86" y="678" class="sub" fill="#daa520">Planned, not in v1.0</text>

  <!-- ============ SHARED CORE ============ -->
  <rect x="500" y="170" width="300" height="530" rx="14" fill="#11141c" stroke="#3aedff" stroke-width="2.4"/>
  <text x="650" y="200" text-anchor="middle" class="ttl" fill="#3aedff">SHARED CORE  (ākāśa · ether)</text>
  <text x="650" y="218" text-anchor="middle" class="sub">bomberman-core Maven module</text>

  <!-- Domain box -->
  <rect x="520" y="240" width="260" height="130" rx="10" fill="#0a2030" stroke="#3aedff" stroke-width="1.4"/>
  <text x="650" y="262" text-anchor="middle" class="ttl" fill="#3aedff">Domain entities</text>
  <line x1="532" y1="272" x2="768" y2="272" stroke="#3aedff" stroke-width="0.6" opacity="0.6"/>
  <text x="536" y="292" class="sub">Bomberman · Player · Bomb</text>
  <text x="536" y="310" class="sub">Explosion · Score · Arena · Tile</text>
  <text x="536" y="328" class="sub">Bonus + 7 subclasses</text>
  <text x="536" y="346" class="sub">PowerUpItem · GameState · GameMode</text>

  <!-- Wire box -->
  <rect x="520" y="395" width="260" height="130" rx="10" fill="#0a2030" stroke="#3aedff" stroke-width="1.4"/>
  <text x="650" y="417" text-anchor="middle" class="ttl" fill="#3aedff">Wire / DTO</text>
  <line x1="532" y1="427" x2="768" y2="427" stroke="#3aedff" stroke-width="0.6" opacity="0.6"/>
  <text x="536" y="447" class="sub">Envelope · WireCodec · MessageType</text>
  <text x="536" y="465" class="sub">WorldSnapshot · PlayerSnapshot</text>
  <text x="536" y="483" class="sub">BombSnapshot · ExplosionSnapshot</text>
  <text x="536" y="501" class="sub">MatchStart · MatchEnd · Inputs</text>

  <!-- Sim box -->
  <rect x="520" y="550" width="260" height="130" rx="10" fill="#0a2030" stroke="#3aedff" stroke-width="1.4"/>
  <text x="650" y="572" text-anchor="middle" class="ttl" fill="#3aedff">Simulation</text>
  <line x1="532" y1="582" x2="768" y2="582" stroke="#3aedff" stroke-width="0.6" opacity="0.6"/>
  <text x="536" y="602" class="sub">GameWorld (authoritative)</text>
  <text x="536" y="620" class="sub">Snapshotter · TickClock</text>
  <text x="536" y="638" class="sub">CollisionResolver</text>
  <text x="536" y="656" class="sub">Deterministic, no I/O</text>

  <!-- ============ SERVER TIER ============ -->
  <rect x="920" y="100" width="540" height="620" rx="14" fill="#11141c" stroke="#ff3ad9" stroke-width="2"/>
  <text x="1190" y="130" text-anchor="middle" class="ttl" fill="#ff3ad9">SERVER TIER  (agni · fire)</text>
  <text x="1190" y="148" text-anchor="middle" class="sub">Authoritative simulation · Netty WebSocket</text>

  <!-- Netty Edge -->
  <rect x="950" y="170" width="240" height="120" rx="10" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="1070" y="194" text-anchor="middle" class="ttl" fill="#ff3ad9">Netty Edge</text>
  <line x1="962" y1="204" x2="1178" y2="204" stroke="#ff3ad9" stroke-width="0.8" opacity="0.6"/>
  <text x="966" y="222" class="sub">GameServer · WebSocketServer</text>
  <text x="966" y="240" class="sub">GameServerHandler</text>
  <text x="966" y="258" class="sub">TLS termination / wss://</text>
  <text x="966" y="276" class="sub">Frame · ping · backpressure</text>

  <!-- Lobby + Auth -->
  <rect x="1220" y="170" width="220" height="120" rx="10" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="1330" y="194" text-anchor="middle" class="ttl" fill="#ff3ad9">Lobby + Auth</text>
  <line x1="1232" y1="204" x2="1428" y2="204" stroke="#ff3ad9" stroke-width="0.8" opacity="0.6"/>
  <text x="1236" y="222" class="sub">LobbyService</text>
  <text x="1236" y="240" class="sub">AuthRegistry</text>
  <text x="1236" y="258" class="sub">SessionRegistry</text>
  <text x="1236" y="276" class="sub">ClientSession</text>

  <!-- Match Manager -->
  <rect x="950" y="320" width="240" height="120" rx="10" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="1070" y="344" text-anchor="middle" class="ttl" fill="#ff3ad9">MatchManager</text>
  <line x1="962" y1="354" x2="1178" y2="354" stroke="#ff3ad9" stroke-width="0.8" opacity="0.6"/>
  <text x="966" y="372" class="sub">Pairs queued players</text>
  <text x="966" y="390" class="sub">Creates MatchSession</text>
  <text x="966" y="408" class="sub">Tracks active matches</text>
  <text x="966" y="426" class="sub">Disposes finished sessions</text>

  <!-- Match Session -->
  <rect x="1220" y="320" width="220" height="120" rx="10" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="1330" y="344" text-anchor="middle" class="ttl" fill="#ff3ad9">MatchSession</text>
  <line x1="1232" y1="354" x2="1428" y2="354" stroke="#ff3ad9" stroke-width="0.8" opacity="0.6"/>
  <text x="1236" y="372" class="sub">Owns GameWorld</text>
  <text x="1236" y="390" class="sub">20 Hz tick loop</text>
  <text x="1236" y="408" class="sub">Broadcasts snapshots</text>
  <text x="1236" y="426" class="sub">Applies inputs server-side</text>

  <!-- Chat + Bots -->
  <rect x="950" y="470" width="240" height="120" rx="10" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="1070" y="494" text-anchor="middle" class="ttl" fill="#ff3ad9">Chat + Bots</text>
  <line x1="962" y1="504" x2="1178" y2="504" stroke="#ff3ad9" stroke-width="0.8" opacity="0.6"/>
  <text x="966" y="522" class="sub">ChatRouter</text>
  <text x="966" y="540" class="sub">ProfanityFilter</text>
  <text x="966" y="558" class="sub">BotController (AI fillers)</text>
  <text x="966" y="576" class="sub">Same input pipeline</text>

  <!-- Metrics -->
  <rect x="1220" y="470" width="220" height="120" rx="10" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="1330" y="494" text-anchor="middle" class="ttl" fill="#ff3ad9">Ops / Metrics</text>
  <line x1="1232" y1="504" x2="1428" y2="504" stroke="#ff3ad9" stroke-width="0.8" opacity="0.6"/>
  <text x="1236" y="522" class="sub">Micrometer counters</text>
  <text x="1236" y="540" class="sub">Tick budget gauge</text>
  <text x="1236" y="558" class="sub">/health · /ready endpoints</text>
  <text x="1236" y="576" class="sub">Structured JSON logs</text>

  <!-- ============ DATA TIER ============ -->
  <rect x="40" y="760" width="640" height="150" rx="14" fill="#11141c" stroke="#ffb53a" stroke-width="2"/>
  <text x="360" y="790" text-anchor="middle" class="ttl" fill="#ffb53a">DATA TIER  (pṛthvī · earth)</text>
  <text x="360" y="808" text-anchor="middle" class="sub">Persistence + ephemeral state</text>

  <rect x="70" y="825" width="280" height="65" rx="10" fill="#2b1d05" stroke="#ffb53a" stroke-width="1.6"/>
  <text x="210" y="850" text-anchor="middle" class="ttl" fill="#ffb53a">PostgreSQL</text>
  <text x="210" y="872" text-anchor="middle" class="sub">accounts · match history · rankings</text>

  <rect x="380" y="825" width="280" height="65" rx="10" fill="#2b1d05" stroke="#ffb53a" stroke-width="1.6"/>
  <text x="520" y="850" text-anchor="middle" class="ttl" fill="#ffb53a">Redis</text>
  <text x="520" y="872" text-anchor="middle" class="sub">sessions · matchmaking queue · cache</text>

  <!-- ============ OPS TIER ============ -->
  <rect x="760" y="760" width="700" height="150" rx="14" fill="#11141c" stroke="#daa520" stroke-width="2"/>
  <text x="1110" y="790" text-anchor="middle" class="ttl" fill="#daa520">BUILD + OPS  (gandha · scent)</text>
  <text x="1110" y="808" text-anchor="middle" class="sub">Tooling, CI, container runtime</text>

  <rect x="780" y="825" width="200" height="65" rx="10" fill="#2a2110" stroke="#daa520" stroke-width="1.4"/>
  <text x="880" y="850" text-anchor="middle" class="ttl" fill="#daa520">Maven 3</text>
  <text x="880" y="872" text-anchor="middle" class="sub">multi-module build</text>

  <rect x="1000" y="825" width="200" height="65" rx="10" fill="#2a2110" stroke="#daa520" stroke-width="1.4"/>
  <text x="1100" y="850" text-anchor="middle" class="ttl" fill="#daa520">JDK 17</text>
  <text x="1100" y="872" text-anchor="middle" class="sub">Red Hat OpenJDK</text>

  <rect x="1220" y="825" width="220" height="65" rx="10" fill="#2a2110" stroke="#daa520" stroke-width="1.4"/>
  <text x="1330" y="850" text-anchor="middle" class="ttl" fill="#daa520">Docker · GitHub Actions</text>
  <text x="1330" y="872" text-anchor="middle" class="sub">CI + container images</text>

  <!-- ============ CONNECTIONS ============ -->
  <!-- Client tier (right edge x=380) -> Shared core (left edge x=500). Lanes at y=250, y=430, y=620 -->
  <!-- JavaFX -> Domain (lane 250) -->
  <path class="conn" d="M 380,250 H 500" stroke="#3affb5" marker-end="url(#arrGreen)"/>
  <text x="440" y="244" text-anchor="middle" class="edge">imports core</text>

  <!-- Web -> Wire (lane 440) -->
  <path class="conn" d="M 350,440 H 440 V 460 H 500" stroke="#3affb5" marker-end="url(#arrGreen)"/>
  <text x="395" y="434" text-anchor="middle" class="edge">DTO + codec</text>

  <!-- 3D Spectator -> Sim (lane 620) -->
  <path class="conn" d="M 350,620 H 500" stroke="#3affb5" marker-end="url(#arrGreen)" stroke-dasharray="6 4"/>
  <text x="425" y="614" text-anchor="middle" class="edge">read-only DTO</text>

  <!-- Shared core (right edge x=800) -> Server tier (left edge x=920). Lanes at y=300, y=460, y=620 -->
  <path class="conn" d="M 800,305 H 860 V 230 H 950" stroke="#3aedff" marker-end="url(#arrCyan)"/>
  <text x="880" y="224" text-anchor="middle" class="edge">domain reused</text>

  <path class="conn" d="M 800,460 H 860 V 380 H 950" stroke="#3aedff" marker-end="url(#arrCyan)"/>
  <text x="880" y="374" text-anchor="middle" class="edge">snapshots</text>

  <path class="conn" d="M 800,615 H 860 V 530 H 950" stroke="#3aedff" marker-end="url(#arrCyan)"/>
  <text x="880" y="524" text-anchor="middle" class="edge">GameWorld</text>

  <!-- Server internal: Netty Edge -> Match Manager (down) -->
  <path class="conn" d="M 1070,290 V 320" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="1140" y="308" text-anchor="middle" class="edge">route frames</text>

  <!-- Server internal: Lobby -> Match Manager (down + left) -->
  <path class="conn" d="M 1330,290 V 308 H 1190" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="1260" y="302" text-anchor="middle" class="edge">create match</text>

  <!-- Server internal: Match Manager -> Match Session (right) -->
  <path class="conn" d="M 1190,380 H 1220" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="1205" y="374" text-anchor="middle" class="edge">spawn</text>

  <!-- Server internal: Match Session -> Chat/Bots (down + left) -->
  <path class="conn" d="M 1330,440 V 455 H 1070 V 470" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="1200" y="449" text-anchor="middle" class="edge">broadcast loop</text>

  <!-- Server internal: Match Session -> Metrics (down) -->
  <path class="conn" d="M 1330,440 V 470" stroke="#ff3ad9" marker-end="url(#arrPink)"/>

  <!-- Server -> Data: Netty Edge (x=950,y=230) curve down-left to Postgres top -->
  <path class="conn" d="M 970,290 V 740 H 210 V 825" stroke="#ffb53a" marker-end="url(#arrAmber)"/>
  <text x="600" y="734" text-anchor="middle" class="edge">JDBC · accounts + history</text>

  <!-- Server -> Redis: Lobby/Auth (1240,290) down to Redis top -->
  <path class="conn" d="M 1240,290 V 745 H 520 V 825" stroke="#ffb53a" marker-end="url(#arrAmber)"/>
  <text x="880" y="739" text-anchor="middle" class="edge">sessions · queue</text>

  <!-- Ops dotted to server -->
  <path class="conn" d="M 1110,825 V 720" stroke="#daa520" stroke-dasharray="4 4" opacity="0.7"/>
  <text x="1116" y="750" class="edge">build · deploy</text>

  <!-- Client connection to Netty (the actual WS link) -->
  <path class="conn" d="M 350,210 H 410 V 80 H 1070 V 170" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="730" y="74" text-anchor="middle" class="edge">WebSocket  wss://  20 Hz</text>

  <!-- Legend -->
  <rect x="40" y="900" width="1420" height="30" rx="6" fill="#11141c" stroke="#1f2533" stroke-width="1"/>
  <circle cx="60" cy="915" r="5" fill="#3affb5"/><text x="74" y="919" class="sub">imports core</text>
  <circle cx="190" cy="915" r="5" fill="#3aedff"/><text x="204" y="919" class="sub">shared DTO / domain</text>
  <circle cx="360" cy="915" r="5" fill="#ff3ad9"/><text x="374" y="919" class="sub">server runtime / WebSocket</text>
  <circle cx="580" cy="915" r="5" fill="#ffb53a"/><text x="594" y="919" class="sub">persistence / cache</text>
  <circle cx="760" cy="915" r="5" fill="#daa520"/><text x="774" y="919" class="sub">build · ops</text>
</svg>
