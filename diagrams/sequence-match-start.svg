<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #1a1d24; }
    .title { font-weight: 700; font-size: 22px; fill: #1a1d24; }
    .ttl { font-weight: 700; font-size: 14px; fill: #1a1d24; }
    .sub { font-size: 12px; fill: #5a626e; }
    .edge { font-size: 12px; fill: #3a3f47; }
    .num { font-size: 12px; font-weight: 700; fill: #1a1d24; }
    .grp { font-weight: 700; font-size: 13px; letter-spacing: 1.2px; fill: #6a6f78; }
    .conn { fill: none; stroke: #5a626e; stroke-width: 1.6; }
    .life { stroke: #b0b6bf; stroke-width: 1.4; stroke-dasharray: 6 5; }
    .bar  { fill: #fceaf3; stroke: #c2185b; stroke-width: 1; }
  </style>
  <title id="title">Sequence — Hello to MatchStart</title>
  <desc id="desc">Sequence of a client logging in, joining the lobby, being matched, and receiving MatchStart.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#5a626e"/></marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%"><feDropShadow stdDeviation="1" dx="0" dy="1" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <rect x="0" y="0" width="1200" height="800" fill="#ffffff"/>
  <rect x="24" y="24" width="1152" height="752" rx="10" fill="#fdfdfb" stroke="#d6dae0" stroke-width="1.5"/>

  <text x="60" y="68" class="title">Sequence — Hello to MatchStart</text>
  <text x="60" y="92" class="sub">Login · lobby join · matchmaking · MatchStart broadcast</text>

  <!-- 6 lifelines: 140, 320, 500, 680, 860, 1080 (≥160 px gutters; trimmed to 6 from 7) -->

  <rect x="60" y="120" width="160" height="60" rx="8" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.4" filter="url(#sh)"/>
  <text x="140" y="146" text-anchor="middle" class="ttl">Client (A)</text>
  <text x="140" y="166" text-anchor="middle" class="sub">GameClient</text>

  <rect x="240" y="120" width="160" height="60" rx="8" fill="#fceaf3" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="320" y="146" text-anchor="middle" class="ttl">WebSocketServer</text>
  <text x="320" y="166" text-anchor="middle" class="sub">Netty edge</text>

  <rect x="420" y="120" width="160" height="60" rx="8" fill="#fceaf3" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="500" y="146" text-anchor="middle" class="ttl">AuthRegistry</text>
  <text x="500" y="166" text-anchor="middle" class="sub">+ Session</text>

  <rect x="600" y="120" width="160" height="60" rx="8" fill="#fceaf3" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="680" y="146" text-anchor="middle" class="ttl">LobbyService</text>
  <text x="680" y="166" text-anchor="middle" class="sub">presence/queue</text>

  <rect x="780" y="120" width="160" height="60" rx="8" fill="#fceaf3" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="860" y="146" text-anchor="middle" class="ttl">MatchManager</text>
  <text x="860" y="166" text-anchor="middle" class="sub">+ MatchSession</text>

  <rect x="1000" y="120" width="160" height="60" rx="8" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1080" y="146" text-anchor="middle" class="ttl">Matched Clients</text>
  <text x="1080" y="166" text-anchor="middle" class="sub">A · B · C · D</text>

  <!-- Lifelines (y 180 → 640) -->
  <line class="life" x1="140"  y1="180" x2="140"  y2="640"/>
  <line class="life" x1="320"  y1="180" x2="320"  y2="640"/>
  <line class="life" x1="500"  y1="180" x2="500"  y2="640"/>
  <line class="life" x1="680"  y1="180" x2="680"  y2="640"/>
  <line class="life" x1="860"  y1="180" x2="860"  y2="640"/>
  <line class="life" x1="1080" y1="180" x2="1080" y2="640"/>

  <!-- Activation bars -->
  <rect class="bar" x="315" y="220" width="10" height="120"/>
  <rect class="bar" x="495" y="260" width="10" height="60"/>
  <rect class="bar" x="675" y="380" width="10" height="140"/>
  <rect class="bar" x="855" y="500" width="10" height="100"/>

  <!-- 1. Client → WSS Hello, y=220 -->
  <path class="conn" d="M 140,220 H 315" marker-end="url(#arr)"/>
  <rect x="170" y="202" width="180" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="183" y="214" class="num">1.</text>
  <text x="197" y="214" class="edge">Envelope{ HELLO, token }</text>

  <!-- 2. WSS → AuthRegistry, y=260 -->
  <path class="conn" d="M 325,260 H 495" marker-end="url(#arr)"/>
  <rect x="368" y="242" width="116" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="378" y="254" class="num">2.</text>
  <text x="392" y="254" class="edge">validate(token)</text>

  <!-- 3. AuthRegistry → WSS return, y=300 (dashed) -->
  <path class="conn" d="M 495,300 H 325" marker-end="url(#arr)" stroke-dasharray="5 4"/>
  <rect x="370" y="282" width="116" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="380" y="294" class="num">3.</text>
  <text x="394" y="294" class="edge">ok( PlayerId )</text>

  <!-- 4. WSS → Client WELCOME, y=340 (dashed return) -->
  <path class="conn" d="M 315,340 H 140" marker-end="url(#arr)" stroke-dasharray="5 4"/>
  <rect x="170" y="322" width="160" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="180" y="334" class="num">4.</text>
  <text x="194" y="334" class="edge">WELCOME { playerId }</text>

  <!-- 5. Client → LobbyService (via WSS), y=400. Use Z-route: 140 → 380 → 680 -->
  <path class="conn" d="M 140,400 H 580 V 400 H 675" marker-end="url(#arr)"/>
  <rect x="300" y="382" width="240" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="310" y="394" class="num">5.</text>
  <text x="324" y="394" class="edge">JOIN_LOBBY  (routed via WSS)</text>

  <!-- 6. LobbyService self-loop, y=440 → y=470 -->
  <path class="conn" d="M 685,440 H 740 V 470 H 685" marker-end="url(#arr)"/>
  <rect x="694" y="422" width="120" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="702" y="434" class="num">6.</text>
  <text x="716" y="434" class="edge">enqueue(player)</text>

  <!-- 7. LobbyService → Client LOBBY_SNAPSHOT (dashed), y=500. Route 680 → 140 -->
  <path class="conn" d="M 675,500 H 140" marker-end="url(#arr)" stroke-dasharray="5 4"/>
  <rect x="280" y="482" width="160" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="290" y="494" class="num">7.</text>
  <text x="304" y="494" class="edge">LOBBY_SNAPSHOT</text>

  <!-- 8. LobbyService → MatchManager, y=540 -->
  <path class="conn" d="M 685,540 H 855" marker-end="url(#arr)"/>
  <rect x="708" y="522" width="148" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="718" y="534" class="num">8.</text>
  <text x="732" y="534" class="edge">readyToMatch(4)</text>

  <!-- 9. MatchManager self-loop, y=580 → y=600 -->
  <path class="conn" d="M 865,580 H 920 V 600 H 865" marker-end="url(#arr)"/>
  <rect x="868" y="562" width="104" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="876" y="574" class="num">9.</text>
  <text x="890" y="574" class="edge">allocate match-id</text>

  <!-- 10. MatchManager → Matched Clients MATCH_START, y=620 -->
  <path class="conn" d="M 865,620 H 1000" marker-end="url(#arr)"/>
  <rect x="884" y="602" width="116" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="890" y="614" class="num">10.</text>
  <text x="908" y="614" class="edge">MATCH_START</text>

  <!-- Notes -->
  <rect x="60" y="680" width="340" height="80" rx="8" fill="#fff5dc" stroke="#b8860b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="80" y="704" class="ttl">Handshake budget</text>
  <line x1="80" y1="714" x2="380" y2="714" stroke="#d6dae0" stroke-width="1"/>
  <text x="80" y="734" class="sub">Steps 1–4 complete in &lt; 50 ms</text>
  <text x="80" y="752" class="sub">(one RTT + auth lookup)</text>

  <rect x="420" y="680" width="380" height="80" rx="8" fill="#e3f1fa" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="440" y="704" class="ttl">Pairing rule</text>
  <line x1="440" y1="714" x2="780" y2="714" stroke="#d6dae0" stroke-width="1"/>
  <text x="440" y="734" class="sub">MatchManager waits for 4 ready players</text>
  <text x="440" y="752" class="sub">(or 30 s timeout — bots fill the gap)</text>

  <rect x="820" y="680" width="320" height="80" rx="8" fill="#fff9e6" stroke="#9c7c20" stroke-width="1.4" filter="url(#sh)"/>
  <text x="840" y="704" class="ttl">Result</text>
  <line x1="840" y1="714" x2="1120" y2="714" stroke="#d6dae0" stroke-width="1"/>
  <text x="840" y="734" class="sub">Match-id known to all participants.</text>
  <text x="840" y="752" class="sub">Steps 1.–10. = strict happens-before.</text>
</svg>
