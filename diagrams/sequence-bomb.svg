<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <style>
    rect { rx: 6; ry: 6; }
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #e8eef8; }
    .ttl { font-weight: 700; font-size: 14px; }
    .sub { font-size: 12px; fill: #9aa6b8; }
    .edge { font-size: 11px; fill: #c5cbd6; }
  </style>
  <title id="title">Sequence — PlaceBomb to Explosion</title>
  <desc id="desc">Sequence diagram of a bomb being placed by a client, simulated by the server, and broadcast as a WorldSnapshot.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2533" stroke-width="0.5"/>
    </pattern>
    <marker id="arrCyan" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#3aedff"/></marker>
    <marker id="arrPink" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#ff3ad9"/></marker>
    <marker id="arrAmber" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#ffb53a"/></marker>
    <marker id="arrGreen" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#3affb5"/></marker>
  </defs>
  <style>
    text { fill: #e6eef8; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .title { font-weight: 700; font-size: 22px; }
    .ttl { font-weight: 700; font-size: 13px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; paint-order: stroke; stroke: #08090d; stroke-width: 3px; stroke-linejoin: round; }
    .num { font-size: 11px; font-weight: 700; fill: #daa520; paint-order: stroke; stroke: #08090d; stroke-width: 3px; stroke-linejoin: round; }
    .conn { fill: none; stroke-width: 2; }
    .life { stroke: #3aedff; stroke-width: 1.4; stroke-dasharray: 6 5; opacity: 0.55; }
    .bar  { fill: #2a0d20; stroke: #ff3ad9; stroke-width: 1; }
  </style>
  <rect x="0" y="0" width="1500" height="1000" fill="#08090d"/>
  <rect x="0" y="0" width="1500" height="1000" fill="url(#grid)"/>

  <text x="40" y="42" class="title" fill="#daa520">Sequence — PlaceBomb to Explosion</text>
  <text x="40" y="64" class="sub">Client press · server-side validation · 20 Hz tick · WorldSnapshot broadcast</text>

  <!-- Lifeline x-positions (7 actors, equally spaced) -->
  <!-- Centers: 130, 320, 510, 700, 890, 1080, 1320 -->

  <!-- Lifeline header boxes (y=100, h=60) -->
  <rect x="50"   y="100" width="160" height="60" rx="8" fill="#0d2823" stroke="#3affb5" stroke-width="1.6"/>
  <text x="130"  y="125" text-anchor="middle" class="ttl" fill="#3affb5">Player (Client)</text>
  <text x="130"  y="145" text-anchor="middle" class="sub">GameClient / View</text>

  <rect x="240"  y="100" width="160" height="60" rx="8" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="320"  y="125" text-anchor="middle" class="ttl" fill="#ff3ad9">WebSocketServer</text>
  <text x="320"  y="145" text-anchor="middle" class="sub">Netty edge</text>

  <rect x="430"  y="100" width="160" height="60" rx="8" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="510"  y="125" text-anchor="middle" class="ttl" fill="#ff3ad9">GameServerHandler</text>
  <text x="510"  y="145" text-anchor="middle" class="sub">frame router</text>

  <rect x="620"  y="100" width="160" height="60" rx="8" fill="#2a0d20" stroke="#ff3ad9" stroke-width="1.6"/>
  <text x="700"  y="125" text-anchor="middle" class="ttl" fill="#ff3ad9">MatchSession</text>
  <text x="700"  y="145" text-anchor="middle" class="sub">tick loop</text>

  <rect x="810"  y="100" width="160" height="60" rx="8" fill="#0a2030" stroke="#3aedff" stroke-width="1.6"/>
  <text x="890"  y="125" text-anchor="middle" class="ttl" fill="#3aedff">GameWorld</text>
  <text x="890"  y="145" text-anchor="middle" class="sub">authoritative sim</text>

  <rect x="1000" y="100" width="160" height="60" rx="8" fill="#0a2030" stroke="#3aedff" stroke-width="1.6"/>
  <text x="1080" y="125" text-anchor="middle" class="ttl" fill="#3aedff">Snapshotter</text>
  <text x="1080" y="145" text-anchor="middle" class="sub">WireCodec</text>

  <rect x="1240" y="100" width="160" height="60" rx="8" fill="#0d2823" stroke="#3affb5" stroke-width="1.6"/>
  <text x="1320" y="125" text-anchor="middle" class="ttl" fill="#3affb5">All Clients</text>
  <text x="1320" y="145" text-anchor="middle" class="sub">render only</text>

  <!-- Lifelines (vertical dashed lines from header bottom to y=900) -->
  <line class="life" x1="130"  y1="160" x2="130"  y2="900"/>
  <line class="life" x1="320"  y1="160" x2="320"  y2="900"/>
  <line class="life" x1="510"  y1="160" x2="510"  y2="900"/>
  <line class="life" x1="700"  y1="160" x2="700"  y2="900"/>
  <line class="life" x1="890"  y1="160" x2="890"  y2="900"/>
  <line class="life" x1="1080" y1="160" x2="1080" y2="900"/>
  <line class="life" x1="1320" y1="160" x2="1320" y2="900"/>

  <!-- Activation bars (thin rects on lifeline; expand around active segments) -->
  <rect class="bar" x="315"  y="200" width="10" height="40"/>   <!-- WSS while routing -->
  <rect class="bar" x="505"  y="240" width="10" height="60"/>   <!-- handler -->
  <rect class="bar" x="695"  y="300" width="10" height="160"/>  <!-- MatchSession -->
  <rect class="bar" x="885"  y="340" width="10" height="120"/>  <!-- GameWorld place -->
  <rect class="bar" x="695"  y="540" width="10" height="280"/>  <!-- MatchSession tick -->
  <rect class="bar" x="885"  y="580" width="10" height="200"/>  <!-- GameWorld explode -->
  <rect class="bar" x="1075" y="640" width="10" height="140"/>  <!-- Snapshotter -->

  <!-- Message arrows (horizontal). Format: number . label above the line. -->
  <!-- 1. Player -> WSS at y=200 -->
  <path class="conn" d="M 130,200 H 315" stroke="#3affb5" marker-end="url(#arrGreen)"/>
  <text x="222" y="194" text-anchor="middle" class="edge"><tspan class="num">1.</tspan> Envelope{ PLACE_BOMB }</text>

  <!-- 2. WSS -> Handler at y=240 -->
  <path class="conn" d="M 325,240 H 505" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="415" y="234" text-anchor="middle" class="edge"><tspan class="num">2.</tspan> route(frame)</text>

  <!-- 3. Handler -> MatchSession at y=300 -->
  <path class="conn" d="M 515,300 H 695" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="605" y="294" text-anchor="middle" class="edge"><tspan class="num">3.</tspan> apply(input, sessionId)</text>

  <!-- 4. MatchSession -> GameWorld at y=360 -->
  <path class="conn" d="M 705,360 H 885" stroke="#3aedff" marker-end="url(#arrCyan)"/>
  <text x="795" y="354" text-anchor="middle" class="edge"><tspan class="num">4.</tspan> placeBomb(player, tile)</text>

  <!-- 5. GameWorld -> MatchSession return at y=420 (dashed return) -->
  <path class="conn" d="M 885,420 H 705" stroke="#3aedff" marker-end="url(#arrCyan)" stroke-dasharray="5 4"/>
  <text x="795" y="414" text-anchor="middle" class="edge"><tspan class="num">5.</tspan> Bomb(id, fuseMs)</text>

  <!-- 6. self-loop on MatchSession (queues event), y=480 -->
  <path class="conn" d="M 705,480 H 760 V 510 H 705" stroke="#ff3ad9" marker-end="url(#arrPink)"/>
  <text x="760" y="476" text-anchor="middle" class="edge"><tspan class="num">6.</tspan> queue tick event</text>

  <!-- 7. tick: MatchSession -> GameWorld at y=580 (tick) -->
  <path class="conn" d="M 705,580 H 885" stroke="#3aedff" marker-end="url(#arrCyan)"/>
  <text x="795" y="574" text-anchor="middle" class="edge"><tspan class="num">7.</tspan> tick(dt) — fuse expires</text>

  <!-- 8. self-loop GameWorld spawn explosion, y=640 -->
  <path class="conn" d="M 895,640 H 950 V 670 H 895" stroke="#3aedff" marker-end="url(#arrCyan)"/>
  <text x="950" y="634" text-anchor="middle" class="edge"><tspan class="num">8.</tspan> spawn Explosion + damage tiles</text>

  <!-- 9. GameWorld -> Snapshotter, y=700 -->
  <path class="conn" d="M 895,700 H 1075" stroke="#3aedff" marker-end="url(#arrCyan)"/>
  <text x="985" y="694" text-anchor="middle" class="edge"><tspan class="num">9.</tspan> capture(world)</text>

  <!-- 10. Snapshotter -> MatchSession at y=760 (returns snapshot) -->
  <path class="conn" d="M 1075,760 H 705" stroke="#3aedff" marker-end="url(#arrCyan)" stroke-dasharray="5 4"/>
  <text x="890" y="754" text-anchor="middle" class="edge"><tspan class="num">10.</tspan> WorldSnapshot</text>

  <!-- 11. MatchSession -> All Clients (broadcast) at y=820 -->
  <path class="conn" d="M 705,820 H 1240" stroke="#3affb5" marker-end="url(#arrGreen)"/>
  <text x="970" y="814" text-anchor="middle" class="edge"><tspan class="num">11.</tspan> broadcast(WorldSnapshot)  20 Hz</text>

  <!-- Note: timing call-out (amber) -->
  <rect x="60" y="870" width="500" height="60" rx="10" fill="#2b1d05" stroke="#ffb53a" stroke-width="1.4"/>
  <text x="76" y="892" class="ttl" fill="#ffb53a">Latency budget</text>
  <text x="76" y="912" class="sub">Steps 1–6: ≤ 5 ms · Steps 7–10: one 50 ms tick · Step 11: ≤ 8 ms RTT typical</text>

  <rect x="600" y="870" width="540" height="60" rx="10" fill="#0a2030" stroke="#3aedff" stroke-width="1.4"/>
  <text x="616" y="892" class="ttl" fill="#3aedff">Authority</text>
  <text x="616" y="912" class="sub">Client only requests; GameWorld is the only writer; Snapshotter is the only serializer.</text>

  <rect x="1180" y="870" width="280" height="60" rx="10" fill="#11141c" stroke="#daa520" stroke-width="1.4"/>
  <text x="1196" y="892" class="ttl" fill="#daa520">Result</text>
  <text x="1196" y="912" class="sub">All clients see identical state.</text>

  <!-- Step numbering legend -->
  <text x="40" y="958" class="sub">Sequence numbers (1.–11.) match the activation segments on each lifeline.</text>
</svg>
