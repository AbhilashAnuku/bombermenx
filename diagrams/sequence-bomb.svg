<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="seqTitle seqDesc" viewBox="0 0 1200 900"><title id="seqTitle">Sequence — bomb place to kill</title><desc id="seqDesc">A player presses fire, the input reaches the server, GameWorld plants the bomb, the tick loop counts down the fuse, an Explosion is created, a victim&apos;s Player is killed, and the result is broadcast back to all clients.</desc><defs><marker id="arrC2S" markerHeight="9" markerWidth="9" orient="auto" refX="11" refY="6" viewBox="0 0 12 12"><path fill="#3aedff" d="m0 0 12 6-12 6z"/></marker><marker id="arrS2C" markerHeight="9" markerWidth="9" orient="auto" refX="11" refY="6" viewBox="0 0 12 12"><path fill="#ff3ad9" d="m0 0 12 6-12 6z"/></marker><marker id="arrSelf" markerHeight="8" markerWidth="8" orient="auto" refX="11" refY="6" viewBox="0 0 12 12"><path fill="#94a3b8" d="m0 0 12 6-12 6z"/></marker></defs><path fill="#08090d" d="M0 0h1200v900H0z"/><text x="600" y="38" style="font-weight:700;font-size:18px" text-anchor="middle">Sequence — Bomb: place, tick, explode, kill, broadcast</text><rect width="120" height="44" x="80" y="70" fill="#11141c" stroke="#3affb5" stroke-width="2" rx="6"/><text x="140" y="91" fill="#3affb5" text-anchor="middle">GameClient</text><text x="140" y="106" text-anchor="middle">bomberman-client .net</text><rect width="120" height="44" x="300" y="70" fill="#11141c" stroke="#ff3ad9" stroke-width="2" rx="6"/><text x="360" y="91" fill="#ff3ad9" text-anchor="middle">GameServerHandler</text><text x="360" y="106" text-anchor="middle">.net</text><rect width="120" height="44" x="520" y="70" fill="#11141c" stroke="#ff3ad9" stroke-width="2" rx="6"/><text x="580" y="91" fill="#ff3ad9" text-anchor="middle">MatchSession</text><text x="580" y="106" text-anchor="middle">.match</text><rect width="120" height="44" x="740" y="70" fill="#11141c" stroke="#3aedff" stroke-width="2" rx="6"/><text x="800" y="91" fill="#3aedff" text-anchor="middle">GameWorld</text><text x="800" y="106" text-anchor="middle">bomberman-core .sim</text><rect width="120" height="44" x="960" y="70" fill="#11141c" stroke="#3aedff" stroke-width="2" rx="6"/><text x="1020" y="91" fill="#3aedff" text-anchor="middle">Bomb / Explosion</text><text x="1020" y="106" text-anchor="middle">.entity</text><path stroke="#1f2533" stroke-dasharray="4 4" d="M140 114v726m220-726v726m220-726v726m220-726v726m220-726v726"/><path fill="#0c0f17" stroke="#3affb5" d="M134 160h12v640h-12z"/><path fill="#0c0f17" stroke="#ff3ad9" d="M354 190h12v580h-12zm220 30h12v500h-12z"/><path fill="#0c0f17" stroke="#3aedff" d="M794 250h12v440h-12zm220 120h12v240h-12z"/><text x="250" y="172" text-anchor="middle">1. INPUT { action: PLANT }</text><path stroke="#3aedff" stroke-width="1.5" marker-end="url(#arrC2S)" d="M146 180h208"/><text x="470" y="202" text-anchor="middle">2. dispatchInput(p, env)</text><path stroke="#ff3ad9" stroke-width="1.5" marker-end="url(#arrS2C)" d="M366 210h208"/><text x="690" y="232" text-anchor="middle">3. world.applyInput(p, action)</text><path stroke="#ff3ad9" stroke-width="1.5" marker-end="url(#arrS2C)" d="M586 240h208"/><text x="910" y="262" text-anchor="middle">4. new Bomb(tile, owner, range)</text><path stroke="#3aedff" stroke-width="1.5" marker-end="url(#arrSelf)" d="M806 270h208"/><text x="890" y="302">5. registerBomb(b) - fuse 2.5 s</text><path fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrSelf)" d="M806 310q74 0 74 22t-74 22"/><text x="250" y="382" fill="#ff3ad9" text-anchor="middle">6. SNAPSHOT { bomb placed }</text><path stroke="#ff3ad9" stroke-width="1.5" marker-end="url(#arrS2C)" d="M354 390H146"/><text x="890" y="422">7. tick(dt) x 150 frames @ 60 Hz</text><path fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrSelf)" d="M806 430q74 0 74 22t-74 22"/><text x="910" y="502" text-anchor="middle">8. bomb.tick(dt) - fuse -&gt; 0</text><path stroke="#3aedff" stroke-width="1.5" marker-end="url(#arrSelf)" d="M806 510h208"/><text x="1100" y="540">9. detonate() -&gt; new Explosion(range)</text><text x="890" y="572">10. applyDamage(victim) - victim.kill()</text><path fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrSelf)" d="M806 580q74 0 74 22t-74 22"/><text x="690" y="652" text-anchor="middle">11. KillEvent(victim, killer)</text><path stroke="#ff3ad9" stroke-dasharray="4 3" stroke-width="1.5" marker-end="url(#arrS2C)" d="M794 660H586"/><text x="470" y="682" text-anchor="middle">12. broadcast(snapshot+kill)</text><path stroke="#ff3ad9" stroke-width="1.5" marker-end="url(#arrS2C)" d="M574 690H366"/><text x="250" y="712" fill="#ff3ad9" text-anchor="middle">13. SNAPSHOT { explosion } + KILL</text><path stroke="#ff3ad9" stroke-width="1.5" marker-end="url(#arrS2C)" d="M354 720H146"/><text x="60" y="752">14. ParticleSystem + Haptics</text><path fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrSelf)" d="M134 760q-74 0-74 22t74 22"/><path fill="#3aedff" d="M80 852h14v10H80z"/><text x="100" y="861">client to server</text><path fill="#ff3ad9" d="M220 852h14v10h-14z"/><text x="240" y="861">server to client</text><path fill="#94a3b8" d="M360 852h14v10h-14z"/><text x="380" y="861">self call</text><text x="500" y="861">dashed = return value</text></svg>
