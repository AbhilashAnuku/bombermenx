<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #1a1d24; }
    .title { font-weight: 700; font-size: 22px; fill: #1a1d24; }
    .ttl { font-weight: 700; font-size: 14px; fill: #1a1d24; }
    .sub { font-size: 12px; fill: #5a626e; }
    .edge { font-size: 12px; fill: #3a3f47; }
    .grp { font-weight: 700; font-size: 13px; letter-spacing: 1.2px; fill: #6a6f78; }
    .conn { fill: none; stroke: #5a626e; stroke-width: 1.6; }
  </style>
  <title id="title">BomberMen-X Deployment Topology</title>
  <desc id="desc">Deployment view: end-user devices, edge CDN/TLS, server pods, and the data tier inside a private subnet.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#5a626e"/></marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%"><feDropShadow stdDeviation="1" dx="0" dy="1" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <rect x="0" y="0" width="1400" height="800" fill="#ffffff"/>
  <rect x="24" y="24" width="1352" height="752" rx="10" fill="#fdfdfb" stroke="#d6dae0" stroke-width="1.5"/>

  <text x="60" y="68" class="title">BomberMen-X — Deployment Topology</text>
  <text x="60" y="92" class="sub">End-user devices · CDN/TLS edge · Game server pods · Data tier (private subnet)</text>

  <!-- ============ END USERS column ============ -->
  <rect x="60" y="120" width="240" height="560" rx="8" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.6" filter="url(#sh)"/>
  <text x="180" y="148" text-anchor="middle" class="grp">END-USER DEVICES</text>

  <rect x="80" y="180" width="200" height="100" rx="8" fill="#ffffff" stroke="#0b8a78" stroke-width="1.4" filter="url(#sh)"/>
  <text x="180" y="204" text-anchor="middle" class="ttl">Desktop (Win/Mac/Linux)</text>
  <line x1="100" y1="216" x2="260" y2="216" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="236" class="sub">JavaFX desktop client</text>
  <text x="100" y="254" class="sub">JDK 17 runtime bundle</text>
  <text x="100" y="272" class="sub">Gamepad + keyboard</text>

  <rect x="80" y="300" width="200" height="100" rx="8" fill="#ffffff" stroke="#0b8a78" stroke-width="1.4" filter="url(#sh)"/>
  <text x="180" y="324" text-anchor="middle" class="ttl">Browser (Chromium / FF)</text>
  <line x1="100" y1="336" x2="260" y2="336" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="356" class="sub">HTML5 Canvas client</text>
  <text x="100" y="374" class="sub">Loaded over HTTPS</text>
  <text x="100" y="392" class="sub">WebSocket WSS uplink</text>

  <rect x="80" y="420" width="200" height="100" rx="8" fill="#ffffff" stroke="#0b8a78" stroke-width="1.4" filter="url(#sh)"/>
  <text x="180" y="444" text-anchor="middle" class="ttl">Mobile Web (read-only)</text>
  <line x1="100" y1="456" x2="260" y2="456" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="476" class="sub">iOS Safari / Android</text>
  <text x="100" y="494" class="sub">Lobby + spectator only</text>
  <text x="100" y="512" class="sub">v1.1 candidate</text>

  <rect x="80" y="540" width="200" height="120" rx="8" fill="#ffffff" stroke="#0b8a78" stroke-width="1.4" stroke-dasharray="6 4" filter="url(#sh)"/>
  <text x="180" y="564" text-anchor="middle" class="ttl">3D Spectator desktop</text>
  <line x1="100" y1="576" x2="260" y2="576" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="596" class="sub">JavaFX 3D viewer</text>
  <text x="100" y="614" class="sub">Snapshot stream consumer</text>
  <text x="100" y="632" class="sub">Deferred / stretch</text>
  <text x="100" y="650" class="sub">Post-MVP</text>

  <!-- ============ EDGE TIER column ============ -->
  <rect x="380" y="120" width="240" height="560" rx="8" fill="#e3f1fa" stroke="#1565c0" stroke-width="1.6" filter="url(#sh)"/>
  <text x="500" y="148" text-anchor="middle" class="grp">EDGE TIER (DMZ)</text>

  <rect x="400" y="180" width="200" height="100" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="500" y="204" text-anchor="middle" class="ttl">Cloudflare CDN</text>
  <line x1="420" y1="216" x2="580" y2="216" stroke="#d6dae0" stroke-width="1"/>
  <text x="420" y="236" class="sub">Static HTML / JS / CSS</text>
  <text x="420" y="254" class="sub">Edge TLS termination</text>
  <text x="420" y="272" class="sub">DDoS shield + WAF</text>

  <rect x="400" y="300" width="200" height="100" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="500" y="324" text-anchor="middle" class="ttl">NGINX ingress</text>
  <line x1="420" y1="336" x2="580" y2="336" stroke="#d6dae0" stroke-width="1"/>
  <text x="420" y="356" class="sub">HTTP -&gt; 443 -&gt; wss://</text>
  <text x="420" y="374" class="sub">Sticky WS upgrade</text>
  <text x="420" y="392" class="sub">Health probe + LB</text>

  <rect x="400" y="420" width="200" height="100" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="500" y="444" text-anchor="middle" class="ttl">Auth proxy</text>
  <line x1="420" y1="456" x2="580" y2="456" stroke="#d6dae0" stroke-width="1"/>
  <text x="420" y="476" class="sub">JWT validation</text>
  <text x="420" y="494" class="sub">Rate limit per IP</text>
  <text x="420" y="512" class="sub">Origin allow-list</text>

  <rect x="400" y="540" width="200" height="120" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="500" y="564" text-anchor="middle" class="ttl">Metrics scraper</text>
  <line x1="420" y1="576" x2="580" y2="576" stroke="#d6dae0" stroke-width="1"/>
  <text x="420" y="596" class="sub">Prometheus pull</text>
  <text x="420" y="614" class="sub">Grafana dashboards</text>
  <text x="420" y="632" class="sub">Alertmanager</text>
  <text x="420" y="650" class="sub">SLO: p95 &lt; 80 ms</text>

  <!-- ============ APP TIER column ============ -->
  <rect x="700" y="120" width="280" height="560" rx="8" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="840" y="148" text-anchor="middle" class="grp">APP TIER (server pods)</text>

  <rect x="720" y="180" width="240" height="100" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="840" y="204" text-anchor="middle" class="ttl">game-server pod #1</text>
  <line x1="740" y1="216" x2="940" y2="216" stroke="#d6dae0" stroke-width="1"/>
  <text x="740" y="236" class="sub">Netty 4 + JDK 17 image</text>
  <text x="740" y="254" class="sub">2 vCPU · 2 GB heap</text>
  <text x="740" y="272" class="sub">20 Hz authoritative loop</text>

  <rect x="720" y="300" width="240" height="100" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="840" y="324" text-anchor="middle" class="ttl">game-server pod #2</text>
  <line x1="740" y1="336" x2="940" y2="336" stroke="#d6dae0" stroke-width="1"/>
  <text x="740" y="356" class="sub">Identical image · canary</text>
  <text x="740" y="374" class="sub">Same MatchSession class</text>
  <text x="740" y="392" class="sub">Sticky via session-id</text>

  <rect x="720" y="420" width="240" height="100" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="840" y="444" text-anchor="middle" class="ttl">game-server pod #3</text>
  <line x1="740" y1="456" x2="940" y2="456" stroke="#d6dae0" stroke-width="1"/>
  <text x="740" y="476" class="sub">HPA target: CPU 65%</text>
  <text x="740" y="494" class="sub">Min 2 · max 8 replicas</text>
  <text x="740" y="512" class="sub">Graceful drain on TERM</text>

  <rect x="720" y="540" width="240" height="120" rx="8" fill="#ffffff" stroke="#c2185b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="840" y="564" text-anchor="middle" class="ttl">Bot worker pool</text>
  <line x1="740" y1="576" x2="940" y2="576" stroke="#d6dae0" stroke-width="1"/>
  <text x="740" y="596" class="sub">BotController instances</text>
  <text x="740" y="614" class="sub">Co-located with match pods</text>
  <text x="740" y="632" class="sub">Auto-fill empty slots</text>
  <text x="740" y="650" class="sub">Sandboxed CPU budget</text>

  <!-- ============ DATA TIER column ============ -->
  <rect x="1060" y="120" width="280" height="560" rx="8" fill="#fff5dc" stroke="#b8860b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="1200" y="148" text-anchor="middle" class="grp">DATA TIER (private subnet)</text>

  <rect x="1080" y="180" width="240" height="100" rx="8" fill="#ffffff" stroke="#b8860b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1200" y="204" text-anchor="middle" class="ttl">PostgreSQL 16</text>
  <line x1="1100" y1="216" x2="1300" y2="216" stroke="#d6dae0" stroke-width="1"/>
  <text x="1100" y="236" class="sub">Accounts table</text>
  <text x="1100" y="254" class="sub">Match history + scores</text>
  <text x="1100" y="272" class="sub">PITR 7 days</text>

  <rect x="1080" y="300" width="240" height="100" rx="8" fill="#ffffff" stroke="#b8860b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1200" y="324" text-anchor="middle" class="ttl">Redis 7</text>
  <line x1="1100" y1="336" x2="1300" y2="336" stroke="#d6dae0" stroke-width="1"/>
  <text x="1100" y="356" class="sub">Session tokens</text>
  <text x="1100" y="374" class="sub">Matchmaking queues</text>
  <text x="1100" y="392" class="sub">Hot leaderboards</text>

  <rect x="1080" y="420" width="240" height="100" rx="8" fill="#ffffff" stroke="#b8860b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1200" y="444" text-anchor="middle" class="ttl">Object store (S3)</text>
  <line x1="1100" y1="456" x2="1300" y2="456" stroke="#d6dae0" stroke-width="1"/>
  <text x="1100" y="476" class="sub">Replay archive</text>
  <text x="1100" y="494" class="sub">Asset CDN origin</text>
  <text x="1100" y="512" class="sub">Lifecycle: 90 d cold</text>

  <rect x="1080" y="540" width="240" height="120" rx="8" fill="#ffffff" stroke="#b8860b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1200" y="564" text-anchor="middle" class="ttl">Log sink (Loki)</text>
  <line x1="1100" y1="576" x2="1300" y2="576" stroke="#d6dae0" stroke-width="1"/>
  <text x="1100" y="596" class="sub">JSON structured logs</text>
  <text x="1100" y="614" class="sub">30-day retention</text>
  <text x="1100" y="632" class="sub">Match-id index</text>
  <text x="1100" y="650" class="sub">Read-only for ops</text>

  <!-- ============ CONNECTORS — 4 lanes horizontally ============ -->
  <!-- Client → Edge -->
  <path class="conn" d="M 300,230 H 400" marker-end="url(#arr)"/>
  <rect x="324" y="212" width="52" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="350" y="224" text-anchor="middle" class="edge">wss://</text>

  <path class="conn" d="M 300,350 H 400" marker-end="url(#arr)"/>
  <rect x="316" y="332" width="68" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="350" y="344" text-anchor="middle" class="edge">https+wss</text>

  <path class="conn" d="M 300,470 H 400" marker-end="url(#arr)"/>
  <rect x="328" y="452" width="44" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="350" y="464" text-anchor="middle" class="edge">https</text>

  <path class="conn" d="M 300,600 H 400" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <rect x="312" y="582" width="76" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="350" y="594" text-anchor="middle" class="edge">snapshot WS</text>

  <!-- Edge → App (only NGINX line goes through to pods) -->
  <path class="conn" d="M 600,350 H 660 V 230 H 720" marker-end="url(#arr)"/>
  <rect x="624" y="212" width="76" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="662" y="224" text-anchor="middle" class="edge">WS pod #1</text>

  <path class="conn" d="M 600,350 H 720" marker-end="url(#arr)"/>
  <rect x="624" y="332" width="76" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="662" y="344" text-anchor="middle" class="edge">WS pod #2</text>

  <path class="conn" d="M 600,350 H 660 V 470 H 720" marker-end="url(#arr)"/>
  <rect x="624" y="452" width="76" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="662" y="464" text-anchor="middle" class="edge">WS pod #3</text>

  <!-- Metrics scraper → bot pool (dashed) -->
  <path class="conn" d="M 600,600 H 720" marker-end="url(#arr)" stroke-dasharray="4 4"/>
  <rect x="616" y="582" width="92" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="662" y="594" text-anchor="middle" class="edge">/metrics scrape</text>

  <!-- App → Data -->
  <path class="conn" d="M 960,230 H 1080" marker-end="url(#arr)"/>
  <rect x="988" y="212" width="44" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="224" text-anchor="middle" class="edge">JDBC</text>

  <path class="conn" d="M 960,350 H 1080" marker-end="url(#arr)"/>
  <rect x="976" y="332" width="68" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="344" text-anchor="middle" class="edge">Redis RESP</text>

  <path class="conn" d="M 960,470 H 1080" marker-end="url(#arr)"/>
  <rect x="968" y="452" width="84" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="464" text-anchor="middle" class="edge">S3 PUT replay</text>

  <path class="conn" d="M 960,600 H 1080" marker-end="url(#arr)"/>
  <rect x="980" y="582" width="60" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="594" text-anchor="middle" class="edge">log push</text>

  <!-- Footnote -->
  <text x="60" y="722" class="sub">All data-tier links are inside the private subnet — no public ingress.</text>
</svg>
