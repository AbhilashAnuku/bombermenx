# Build — end to end

Author: Abhilash Anuku (AA), Architect, Delivery Lead

This document explains the BomberMen-X build, top to bottom. It covers Maven, Docker, GitHub Actions, the deploy workflow, the secrets we carry, and an honest "what fails most often and how to recover" section.

## 1. Maven multi-module layout

The parent POM is `F:\Bomber Man X\BomberMan-X\pom.xml`. It declares three modules:

| Module | Purpose |
|---|---|
| `bomb-core` | Deterministic Java 17 simulation, wire DTOs, `Envelope`, `MessageType`, `WireCodec`, `GameConfig` |
| `bomb-server` | Netty WebSocket gateway, matchmaker, AI bots, chat, auth, lobby, `/metrics` |
| `bomb-client` | JavaFX 21 Tron renderer, JInput gamepad, age gate |

The parent pins every dependency version in a single `<dependencyManagement>` block — Netty 4.1.115, Jackson 2.18.2, Kryo 5.6.2 (reserved), JavaFX 21.0.5, JUnit 5.11.4, Postgres JDBC 42.7.4, HikariCP 6.2.1, Flyway 11.0.1, Jedis 5.2.0, slf4j 2.0.16, Logback 1.5.12. Plugins are pinned too: maven-compiler 3.13.0, surefire 3.5.2, failsafe 3.5.2, shade 3.6.0, jacoco 0.8.12, javafx-maven-plugin 0.0.8.

Compiler target is Java 17 for `bomb-core` and `bomb-server`. `bomb-client` requires JDK 21 on the host because JavaFX 21 needs it; the JavaFX modules are pulled by the `javafx-maven-plugin` and Maven picks them up automatically.

## 2. Local build commands

The three commands every architect runs:

```bash
# Build core + server (server jar is shaded into bomb-server/target/bomb-server.jar)
mvn -B -pl bomb-core,bomb-server -am package

# Build core + client (produces bomb-client/target/bomb-client.jar)
mvn -B -pl bomb-core,bomb-client -am package

# Run the JavaFX desktop client (requires JDK 21)
mvn -B -pl bomb-client javafx:run
```

The `-am` flag means "also make dependencies"; without it, the multi-module aggregator skips `bomb-core`. The shaded server jar is fat — it carries Netty, Jackson, Logback, slf4j, Jedis, Postgres JDBC, HikariCP, and Flyway. The shade plugin is wired in `bomb-server/pom.xml`.

Convenience launchers live under `F:\Bomber Man X\BomberMan-X\scripts`:

- `scripts\run-client.cmd` — Windows desktop client launcher
- `scripts\run-client.sh` — macOS / Linux desktop client launcher
- `scripts\loadtest.py` — synthetic 256-bot soak client used by the nightly workflow
- `scripts\generate-stats.py` — generates `presentation\stats.json` from real git + filesystem counts
- `scripts\share-link.cmd` / `share-link.sh` — produces a copy-pasteable link for the browser client

## 3. Docker build

### Dockerfile.server (production server image)

`F:\Bomber Man X\BomberMan-X\Dockerfile.server` is a two-stage build:

1. **Builder stage** — `maven:3.9-eclipse-temurin-17`. Copies the parent and module POMs first, runs `mvn dependency:go-offline` to warm the cache, then copies sources and runs `mvn -B -ntp -pl bomb-core,bomb-server -am package -DskipTests`. The resulting fat jar is staged at `/build/bomb-server.jar`.
2. **Runtime stage** — `eclipse-temurin:17-jre-jammy`. Installs `wget` and `ca-certificates`, creates a non-root user (`bombermenx`, uid 10001), copies the jar into `/app`, exposes 8080, configures `JAVA_OPTS="-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"`, and sets the entrypoint to `java $JAVA_OPTS -jar /app/bomb-server.jar`.

A `HEALTHCHECK` probes `http://localhost:8080/ws` every 30 s. The image is sized to fit Cloud Run's 512 MiB cap.

### Dockerfile.client-build (CI compile validation)

`F:\Bomber Man X\BomberMan-X\Dockerfile.client-build` is CI-only. It compiles `bomb-core` and `bomb-client` inside a `maven:3.9-eclipse-temurin-21` builder and stages the resulting `bomb-client.jar` into a `scratch` image. The point is to catch JavaFX-21 compile errors on every CI run without depending on each architect's local JDK. The image cannot run the JavaFX client because headless Docker has no display.

### docker-compose.yml (always-on dev stack)

`F:\Bomber Man X\BomberMan-X\docker-compose.yml` brings up three services on a `bxnet` bridge network:

- `bomb-server` — built from `Dockerfile.server`, publishes 8080, `restart: unless-stopped`. Environment carries `BX_MAX_PLAYERS=4`, `BX_MIN_PLAYERS=1`, `BX_WARMUP_SECONDS=8` for solo-friendly defaults.
- `postgres` — `postgres:16-alpine`, internal-only (exposed on 5432 inside the network), Postgres health check via `pg_isready`, named volume `bomb-pg-data`.
- `redis` — `redis:7-alpine`, internal-only, `redis-cli ping` health check, named volume `bomb-redis-data`.

`bomb-server` `depends_on` both Postgres and Redis with `service_healthy` so the JVM never tries to open a JDBC connection before Postgres is accepting.

## 4. GitHub Actions

Five workflows live under `F:\Bomber Man X\BomberMan-X\.github\workflows`:

| Workflow | Purpose | Trigger |
|---|---|---|
| `ci.yml` | Pre-beta gate: Maven build, unit tests, Docker build, static checks | every push and PR to `main` or `develop` |
| `release.yml` | Post-beta signed release: builds, signs, uploads artefacts, drafts release notes | git tag `v*` |
| `deploy-cloudrun.yml` | Builds the server image, pushes to Artifact Registry, deploys to Cloud Run | manual dispatch + on release |
| `nightly.yml` | Runs `scripts/loadtest.py` (256-bot soak) against a staging server | cron, nightly |
| `codeql.yml` | CodeQL security scan over Java + JavaScript sources | every push, PR, and weekly cron |

The pre-beta gate has eight stages: Code Commit, Build, Unit Tests, Docker Build, Security Scan, Deploy Staging (in `release.yml`), Integration Tests, Deploy Production (in `release.yml`). The gate enforces our quality bar: any PR that fails the build, the unit tests, the Docker build, or CodeQL blocks the merge button. Branch protection on `main` adds the two-approval rule from the three-architect contract.

The Cloud Run workflow uses workload-identity federation (no long-lived service-account JSON in the repo) and pushes the image to a regional Artifact Registry repo before triggering `gcloud run deploy`.

## 5. Secrets glossary

| Secret | Used by | Notes |
|---|---|---|
| `GCP_PROJECT_ID` | `deploy-cloudrun.yml` | Plain text, repo secret |
| `GCP_WORKLOAD_IDENTITY_PROVIDER` | `deploy-cloudrun.yml` | Identity federation; no long-lived JSON |
| `GCP_SERVICE_ACCOUNT` | `deploy-cloudrun.yml` | Email of the runner identity |
| `GOOGLE_CLIENT_ID` | server runtime | Sourced into the Cloud Run service env, consumed by `GoogleAuthProvider` |
| `REGISTRY_USERNAME` / `REGISTRY_PASSWORD` | release path | Optional, only if pushing to a non-GAR registry mirror |
| `RELEASE_SIGNING_KEY` | `release.yml` | GPG key used to sign jars on a tagged release |
| `BX_PG_PASSWORD` / `BX_REDIS_URL` | production | Set as Cloud Run env vars, not in the image |

The compose file ships hard-coded `bombermenx/bombermenx` Postgres credentials. That is acceptable for the local dev stack because Postgres is bound only to the internal `bxnet` bridge, never published to the host. For production we override via Cloud Run env vars.

## 6. Release process

A tagged release follows this sequence:

1. Merge the release branch into `main` with two architect approvals.
2. Tag locally: `git tag -s v0.2.0 -m "v0.2.0 beta"`.
3. Push the tag: `git push origin v0.2.0`.
4. `release.yml` runs: full build, GPG-signed jars, draft GitHub release, attached artefacts (server jar, client jar, source archive).
5. `deploy-cloudrun.yml` runs against the released image and rolls Cloud Run to the new revision with traffic-split = 100%.
6. The Delivery Lead publishes the draft release notes (`RELEASE_NOTES_v0.2.md` is the template).

Roll-back is one click in Cloud Run: pin traffic back to the prior revision.

## 7. What fails most often and how to recover

| Symptom | Likely cause | Fix |
|---|---|---|
| `mvn -pl bomb-client package` fails with "module not found" | Host has JDK 17, not 21 | Install Eclipse Temurin 21, set `JAVA_HOME`, retry |
| `docker compose up` hangs on `bomb-server` waiting for Postgres | First-run init is slow on cold cache | Wait 30-60 s; the health check polls every 5 s |
| `ci.yml` "build · maven package" red | Cache miss on a slow Actions runner | Re-run; surface a real failure only if it recurs |
| `deploy-cloudrun.yml` red on first run | Workload identity federation not yet wired in GCP | Follow `docs/DEPLOY.md`, then re-run |
| JavaFX client fails with "module javafx.controls not found" | `javafx-maven-plugin` did not resolve modules — usually a network blip on cold Maven cache | `mvn -U dependency:resolve` then `mvn javafx:run` |
| Gamepad not detected by JInput | Pad plugged in after scene-show event | Re-enter the menu screen; JInput re-scans on scene change |
| `nightly.yml` red with WS connection refused | Staging server is cold or has been scaled to zero | Hit `/health` once to warm it; re-trigger the workflow |
| `release.yml` fails at the signing step | `RELEASE_SIGNING_KEY` secret missing or expired | Rotate the GPG key, update the secret, re-tag |

If everything goes red at once, the most useful single command is `docker compose logs -f bomb-server` — the server's slf4j output names the failing collaborator and the line is usually enough to localise the fix.
