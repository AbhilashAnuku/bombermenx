# Build & Run

> Everything needed to build and run BomberMen-X end-to-end.



---

## Build explanation

## Build — end to end

Author: Abhilash Anuku (AA), Architect, Delivery Lead

This document explains the BomberMen-X build, top to bottom. It covers Maven, Docker, GitHub Actions, the deploy workflow, the secrets we carry, and an honest "what fails most often and how to recover" section.

## 1. Maven multi-module layout

The parent POM is `F:\Bomber Man X\BomberMan-X\pom.xml`. It declares three modules:

| Module | Purpose |
|---|---|
| `bomberman-core` | Deterministic Java 17 simulation, wire DTOs, `Envelope`, `MessageType`, `WireCodec`, `GameConfig` |
| `bomberman-server` | Netty WebSocket gateway, matchmaker, AI bots, chat, auth, lobby, `/metrics` |
| `bomberman-client` | JavaFX 21 MANDALA renderer, JInput gamepad, age gate |

The parent pins every dependency version in a single `<dependencyManagement>` block — Netty 4.1.115, Jackson 2.18.2, Kryo 5.6.2 (reserved), JavaFX 21.0.5, JUnit 5.11.4, Postgres JDBC 42.7.4, HikariCP 6.2.1, Flyway 11.0.1, Jedis 5.2.0, slf4j 2.0.16, Logback 1.5.12. Plugins are pinned too: maven-compiler 3.13.0, surefire 3.5.2, failsafe 3.5.2, shade 3.6.0, jacoco 0.8.12, javafx-maven-plugin 0.0.8.

Compiler target is Java 17 for `bomberman-core` and `bomberman-server`. `bomberman-client` requires JDK 21 on the host because JavaFX 21 needs it; the JavaFX modules are pulled by the `javafx-maven-plugin` and Maven picks them up automatically.

## 2. Local build commands

The three commands every architect runs:

```bash
## Build core + server (server jar is shaded into src/bomberman-server/target/bomberman-server.jar)
mvn -B -pl bomberman-core,bomberman-server -am package

## Build core + client (produces src/bomberman-client/target/bomberman-client.jar)
mvn -B -pl bomberman-core,bomberman-client -am package

## Run the JavaFX desktop client (requires JDK 21)
mvn -B -pl bomberman-client javafx:run
```

The `-am` flag means "also make dependencies"; without it, the multi-module aggregator skips `bomberman-core`. The shaded server jar is fat — it carries Netty, Jackson, Logback, slf4j, Jedis, Postgres JDBC, HikariCP, and Flyway. The shade plugin is wired in `src/bomberman-server/pom.xml`.

Convenience launchers live under `F:\Bomber Man X\BomberMan-X\scripts`:

- `scripts\run-client.cmd` — Windows desktop client launcher
- `scripts\run-client.sh` — macOS / Linux desktop client launcher
- `scripts\loadtest.py` — synthetic 256-bot soak client used by the nightly workflow
- `scripts\generate-stats.py` — generates `presentation\stats.json` from real git + filesystem counts
- `scripts\share-link.cmd` / `share-link.sh` — produces a copy-pasteable link for the browser client

## 3. Docker build

### Dockerfile.server (production server image)

`F:\Bomber Man X\BomberMan-X\Dockerfile.server` is a two-stage build:

1. **Builder stage** — `maven:3.9-eclipse-temurin-17`. Copies the parent and module POMs first, runs `mvn dependency:go-offline` to warm the cache, then copies sources and runs `mvn -B -ntp -pl bomberman-core,bomberman-server -am package -DskipTests`. The resulting fat jar is staged at `/build/bomberman-server.jar`.
2. **Runtime stage** — `eclipse-temurin:17-jre-jammy`. Installs `wget` and `ca-certificates`, creates a non-root user (`bombermenx`, uid 10001), copies the jar into `/app`, exposes 8080, configures `JAVA_OPTS="-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"`, and sets the entrypoint to `java $JAVA_OPTS -jar /app/bomberman-server.jar`.

A `HEALTHCHECK` probes `http://localhost:8080/ws` every 30 s. The image is sized to fit Cloud Run's 512 MiB cap.

### Dockerfile.client-build (CI compile validation)

`F:\Bomber Man X\BomberMan-X\Dockerfile.client-build` is CI-only. It compiles `bomberman-core` and `bomberman-client` inside a `maven:3.9-eclipse-temurin-21` builder and stages the resulting `bomberman-client.jar` into a `scratch` image. The point is to catch JavaFX-21 compile errors on every CI run without depending on each architect's local JDK. The image cannot run the JavaFX client because headless Docker has no display.

### docker-compose.yml (always-on dev stack)

`F:\Bomber Man X\BomberMan-X\docker-compose.yml` brings up three services on a `bxnet` bridge network:

- `bomberman-server` — built from `Dockerfile.server`, publishes 8080, `restart: unless-stopped`. Environment carries `BX_MAX_PLAYERS=4`, `BX_MIN_PLAYERS=1`, `BX_WARMUP_SECONDS=8` for solo-friendly defaults.
- `postgres` — `postgres:16-alpine`, internal-only (exposed on 5432 inside the network), Postgres health check via `pg_isready`, named volume `bomb-pg-data`.
- `redis` — `redis:7-alpine`, internal-only, `redis-cli ping` health check, named volume `bomb-redis-data`.

`bomberman-server` `depends_on` both Postgres and Redis with `service_healthy` so the JVM never tries to open a JDBC connection before Postgres is accepting.

## 4. GitHub Actions

Five workflows live under `F:\Bomber Man X\BomberMan-X\.github\workflows`:

| Workflow | Purpose | Trigger |
|---|---|---|
| `ci.yml` | Pre-beta gate: Maven build, unit tests, Docker build, static checks | every push and PR to `main` or `develop` |
| `release.yml` | Post-beta signed release: builds, signs, uploads artefacts, drafts release notes | git tag `v*` |
| `deploy-cloudrun.yml` | Builds the server image, pushes to Artifact Registry, deploys to Cloud Run | manual dispatch + on release |
| `nightly.yml` | Runs `scripts/loadtest.py` (256-bot soak) against a staging server | cron, nightly |
| `codeql.yml` | CodeQL security scan over Java + JavaScript sources | every push, PR, and weekly cron |

The pre-beta gate has eight stages: Code Commit, Build, Unit Tests, Docker Build, Security Scan, Deploy Staging (in `release.yml`), Integration Tests, Deploy Production (in `release.yml`). The gate enforces our quality bar: any PR that fails the build, the unit tests, the Docker build, or CodeQL blocks the merge button. Branch protection on `main` adds the two-approval rule from the three-architect contract.

The Cloud Run workflow uses workload-identity federation (no long-lived service-account JSON in the repo) and pushes the image to a regional Artifact Registry repo before triggering `gcloud run deploy`.

## 5. Secrets glossary

| Secret | Used by | Notes |
|---|---|---|
| `GCP_PROJECT_ID` | `deploy-cloudrun.yml` | Plain text, repo secret |
| `GCP_WORKLOAD_IDENTITY_PROVIDER` | `deploy-cloudrun.yml` | Identity federation; no long-lived JSON |
| `GCP_SERVICE_ACCOUNT` | `deploy-cloudrun.yml` | Email of the runner identity |
| `GOOGLE_CLIENT_ID` | server runtime | Sourced into the Cloud Run service env, consumed by `GoogleAuthProvider` |
| `REGISTRY_USERNAME` / `REGISTRY_PASSWORD` | release path | Optional, only if pushing to a non-GAR registry mirror |
| `RELEASE_SIGNING_KEY` | `release.yml` | GPG key used to sign jars on a tagged release |
| `BX_PG_PASSWORD` / `BX_REDIS_URL` | production | Set as Cloud Run env vars, not in the image |

The compose file ships hard-coded `bombermenx/bombermenx` Postgres credentials. That is acceptable for the local dev stack because Postgres is bound only to the internal `bxnet` bridge, never published to the host. For production we override via Cloud Run env vars.

## 6. Release process

A tagged release follows this sequence:

1. Merge the release branch into `main` with two architect approvals.
2. Tag locally: `git tag -s the next release tag -m "the next release tag beta"`.
3. Push the tag: `git push origin the next release tag`.
4. `release.yml` runs: full build, GPG-signed jars, draft GitHub release, attached artefacts (server jar, client jar, source archive).
5. `deploy-cloudrun.yml` runs against the released image and rolls Cloud Run to the new revision with traffic-split = 100%.
6. The Delivery Lead publishes the draft release notes (`release notes` is the template).

Roll-back is one click in Cloud Run: pin traffic back to the prior revision.

## 7. What fails most often and how to recover

| Symptom | Likely cause | Fix |
|---|---|---|
| `mvn -pl bomberman-client package` fails with "module not found" | Host has JDK 17, not 21 | Install Eclipse Temurin 21, set `JAVA_HOME`, retry |
| `docker compose up` hangs on `bomberman-server` waiting for Postgres | First-run init is slow on cold cache | Wait 30-60 s; the health check polls every 5 s |
| `ci.yml` "build · maven package" red | Cache miss on a slow Actions runner | Re-run; surface a real failure only if it recurs |
| `deploy-cloudrun.yml` red on first run | Workload identity federation not yet wired in GCP | Follow `docs/DEPLOY.md`, then re-run |
| JavaFX client fails with "module javafx.controls not found" | `javafx-maven-plugin` did not resolve modules — usually a network blip on cold Maven cache | `mvn -U dependency:resolve` then `mvn javafx:run` |
| Gamepad not detected by JInput | Pad plugged in after scene-show event | Re-enter the menu screen; JInput re-scans on scene change |
| `nightly.yml` red with WS connection refused | Staging server is cold or has been scaled to zero | Hit `/health` once to warm it; re-trigger the workflow |
| `release.yml` fails at the signing step | `RELEASE_SIGNING_KEY` secret missing or expired | Rotate the GPG key, update the secret, re-tag |

If everything goes red at once, the most useful single command is `docker compose logs -f bomberman-server` — the server's slf4j output names the failing collaborator and the line is usually enough to localise the fix.

## Run it locally

## Run BomberMen-X locally — one-page quickstart

Author: Abhilash Anuku (AA), Architect, Delivery Lead

Three ways to play. Pick whichever matches what you already have installed.

---

## (a) Docker stack — recommended

Brings up the full server plus Postgres 16 plus Redis 7 with `restart: unless-stopped`. The stack stays up across reboots.

Prerequisite: Docker Desktop (or Docker Engine on Linux).

```bash
cd "F:\Bomber Man X\BomberMan-X"
docker compose up -d --build
docker compose logs -f bomberman-server
```

When you see the line `WebSocket server listening on ws://0.0.0.0:8080/ws`, the server is up. Now open one of the clients:

- Browser client: open `F:\Bomber Man X\BomberMan-X\presentation\play.html`, click CONNECT, then JOIN QUEUE.
- War-room dashboard: open `F:\Bomber Man X\BomberMan-X\presentation\poster.html` — it refreshes from `/metrics` every 1.5 seconds.

To stop:

```bash
docker compose down       # keep volumes
docker compose down -v    # nuke Postgres + Redis data
```

---

## (b) Desktop client (high-end MANDALA renderer)

Prerequisites: JDK 21 (Eclipse Temurin recommended) + Maven on the host. JavaFX modules are pulled in automatically by the `javafx-maven-plugin`. You also need the server running — either via the Docker stack (option a) or by launching the server jar directly.

```bash
## macOS / Linux
cd "F:\Bomber Man X\BomberMan-X"
./scripts/run-client.sh

## Windows
cd "F:\Bomber Man X\BomberMan-X"
scripts\run-client.cmd
```

Or directly through Maven:

```bash
mvn -B -pl bomberman-core,bomberman-client -am package
mvn -B -pl bomberman-client javafx:run
```

---

## (c) Zero-install web client

Open `F:\Bomber Man X\BomberMan-X\presentation\play.html` in any modern browser. Click CONNECT, then JOIN QUEUE. The browser client speaks the same wire protocol as the JavaFX desktop client. No JDK install required.

Use this option for demos, recruiting, and quick smoke tests of a freshly built server.

---

## Controls

| Action | Keyboard | Gamepad |
|---|---|---|
| Move | WASD or arrow keys | left stick or D-pad |
| Place bomb | Space | A (Xbox) / X (PlayStation) |
| Quit to menu | Esc | — |

The gamepad is detected via JInput at scene-show time. Plug a controller in before opening the menu screen and it is picked up automatically. If you plug in mid-session, leave the menu and return — JInput re-scans on scene change.

---

## Troubleshooting

| Symptom | Cause | Fix |
|---|---|---|
| `docker compose up` fails with "port 8080 already in use" | Another process owns 8080 on the host | Stop the other process or change the host-side port in `docker-compose.yml` (e.g. `"18080:8080"`) |
| `bomberman-server` waits forever for Postgres on first boot | First-run Postgres init is slow on cold disk | Wait 30-60 seconds — the health check polls every 5 s and the server starts as soon as Postgres reports healthy |
| `mvn javafx:run` fails with "module javafx.controls not found" | Host has JDK 17 instead of JDK 21, or Maven did not resolve the JavaFX modules on cold cache | Install Eclipse Temurin 21, set `JAVA_HOME`, then run `mvn -U dependency:resolve` and retry `mvn javafx:run` |
| JavaFX client window is black or blurry | Wrong JDK / JavaFX combination | Confirm `java -version` reports 21.x. JavaFX 21 ships in the Maven coordinates, not the JDK; no separate SDK install needed |
| Gamepad not detected | Pad plugged in after the menu scene was shown | Press Esc to return to the menu, then re-enter — JInput re-scans on scene change |
| Browser client fails to connect | Mixed-content (HTTPS page, WS not WSS) or server not running | Confirm `docker compose ps` shows `bomberman-server` Up; reload `play.html` from the local filesystem (`file://`) not from a remote HTTPS host |
| `presentation\poster.html` shows "0" everywhere | The poster reads `/metrics`; server may not be reachable | Open `http://localhost:8080/metrics` in the browser. If you see JSON, the poster CORS header is wrong on your build — pull `main` and rebuild |
| Match never starts when you queue solo | Default `BX_WARMUP_SECONDS=8` was overridden | Wait 8 seconds — solo human → 3 bots → match starts. If still stuck, check `docker compose logs bomberman-server` for `Player ... joined queue` lines |
| Server consumes too much memory on Windows | Docker Desktop default WSL2 cap | Lower `JAVA_OPTS` `-XX:MaxRAMPercentage` or raise Docker Desktop's memory budget |

For anything not covered here, the single most useful command is:

```bash
docker compose logs -f bomberman-server
```

The server emits slf4j logs at INFO that name the collaborator (`MatchManager`, `WebSocketServer`, `LobbyService`, `ChatRouter`, `AuthRegistry`) and the line is usually enough to localise the issue.
