# Requirements Traceability — Spec ⇄ Code

This page maps every entity and every functional requirement from the
Bomberman Online requirements specification (Prof. Dr. Floriment Klinaku,
SRH Stuttgart, M.Sc. Applied Computer Science) to the concrete Java
class and source file that implements it.

The vocabulary is the UML domain model: **GameServer, Client, Match,
Player, Bomberman, Arena, Tile, Bomb, Explosion, Bonus (+ FlameBonus,
SpeedBonus, KickBonus, LifeBonus, ArmorBonus), Score**.

## Functional requirements

### 6.1 — Server / connection (FR-01..FR-07)

| FR | Code |
| --- | --- |
| FR-01 GameServer manages matches | `GameServer` holds a `MatchManager`; bootstrap in `BombServerApplication.main()` |
| FR-02 Multiple clients connect | `WebSocketServer` accepts; `ClientSession` per connection |
| FR-03 Server stores id/ip/port/status | `GameServer.serverId/host/port/status` |
| FR-04 Each client has unique id + status | `ClientSession.getSessionId()`, `getPlayerId()` |
| FR-05 Reject actions outside active match | `MatchManager` routes; `MatchSession.applyInput` validates session |
| FR-06 Notify on state change | `MatchSession.broadcast(...)` → `Envelope.of(MessageType.SNAPSHOT, ...)` |
| FR-07 Graceful disconnect | `WebSocketServer.stop()`, shutdown hook in `BombServerApplication` |

### 6.2 — Match (FR-08..FR-16)

| FR | Code |
| --- | --- |
| FR-08 Create new match | `MatchManager.createMatch()` → `new MatchSession(...)` |
| FR-09 2–4 players | `ServerConfig.maxPlayersPerMatch` enforced in `MatchManager` |
| FR-10 Match stores id/start/end/status/maxPlayers | `Match` entity |
| FR-11 Status waiting/running/finished | `Match.Status` enum |
| FR-12 Start when ≥ 2 players | `MatchManager` warmup logic |
| FR-13 Prevent > 4 joining | same |
| FR-14 Finish when one Bomberman alive | `GameWorld.tick()` end-condition |
| FR-15 Finish when time expires | same |
| FR-16 New round after finish | `MatchManager` re-spawn lobby |

## How this was achieved

The codebase already had a working simulation when this traceability
exercise started. To bring class names in line with the spec without
risking the running game, three things happened:

1. **Score** was extracted from `Player` into its own class. The five
   spec counters (`totalPoints`, `stepsTaken`, `bombsPlaced`,
   `playersKilled`, `bonusesCollected`) are now first-class fields,
   incremented at the actual mutation sites in `GameWorld`.
2. **Bomberman** was split out of `Player` as the in-arena pawn entity.
   `Player` keeps account-level state (id, name, joinTime, alive,
   tokens, team) and now owns a `Bomberman` for position, bomb range,
   lives, speed, and abilities. Player getters delegate to Bomberman so
   the simulation code keeps working unchanged.
3. **Bonus** was added as an abstract class with seven concrete
   subclasses (`FlameBonus`, `SpeedBonus`, `KickBonus`, `LifeBonus`,
   `ArmorBonus`, plus `ExtraBombBonus` and `ThrowBonus` for the two
   wire enum values not in the spec's named five). The wire codec keeps
   using `PowerUpType` — `PowerUpItem.toBonus()` projects to the typed
   hierarchy.
4. **Tile** was added as a real class wrapping `(row, col, TileType)`.
   `Arena` keeps the flat `TileType[]` for cache locality, and exposes
   `Arena.getTile(row, col)` for callers that want the domain object.
5. **Match** was added as a server-side entity holding `(id, startTime,
   endTime, status, maxPlayers)`. `MatchSession` owns one Match and
   transitions it through `WAITING → RUNNING → FINISHED` at the
   lifecycle points.
6. **GameServer** was added as a thin facade carrying `(serverId, host,
   port, status)`. `BombServerApplication` constructs one at startup
   and toggles its status as the server lifecycle progresses.

All 11 existing unit tests (7 core + 4 server) still pass after these
changes; the simulation behaviour is unchanged.
