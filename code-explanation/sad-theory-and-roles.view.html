# Software Architecture and Development — Theory and Roles for BomberMen-X

**Date:** 28 May 2026 · Week 7 of 8 — Prototype
**Module:** Software Architecture and Development (SAD), M.Sc. Applied Computer Science, SRH University Stuttgart
**Instructor:** Prof. Dr. Floriment Klinaku
**Project sponsors (Lastenheft):** Prof. Steffen Becker, M. Frank
**Team architects:** Abhilash Anuku (AA), Simranjot Kaur (SK), Jithendra Chittomothu (JC)

---

This document maps the SAD lecture material onto the BomberMen-X codebase at the end of Week 7. It uses Week 3 ("Specifying Software Architecture") and Week 4 ("Architecture Styles") as the theoretical lens and attributes every element to the responsible architect. Line-by-line requirement coverage lives in `deliverables/code-explanation/requirements-traceability.md`.

## 1. Architectural styles

Week 4 of the lecture enumerates the canonical architectural styles: Pipe-and-Filter, Client-Server, Model-View-Controller (MVC), Event-Driven, Layered, and Peer-to-Peer (P2P). For BomberMen-X the dominant style is **Client-Server with a server-authoritative simulation**, overlaid by an **event-broadcast** sub-style on the downlink.

Justification:

- **Client-Server** keeps canonical state on a single trusted process. `bomberman-server` runs `GameServer` and `WebSocketServer`; clients connect through `GameClient`. This matches the lecture's definition of the style.
- **Event-driven overlay.** Once a tick completes, `MatchSession.broadcast` pushes `WorldSnapshot`, `GameEvent`, and `KillFeedEntry` to every client. Clients are pure subscribers; they only originate `InputFrame` and `AbilityRequest` on the uplink.
- **P2P was rejected.** A peer-to-peer mesh exposes the simulation to client tampering and demands distributed reconciliation that the eight-week timebox cannot absorb.
- **Microservices were rejected** for the same timebox reason: additional hops, discovery, and observability would exceed the MVP scope in the Lastenheft.
- **MVC and Layered styles remain internally** — the client follows MVC (`ArenaView`/`HudOverlay` as views, `GameClient` as controller, `WorldSnapshot` as projected model) and the server is layered (`net` → `match` → `core.sim`).

## 2. Viewpoints and views

Week 3 of the lecture follows Clements et al. and groups architectural views into three viewpoint categories:

1. **Module and Data viewpoint** — what the code is decomposed into.
2. **Component-and-Connector (C&C) viewpoint** — what runs at runtime and how it talks.
3. **Allocation viewpoint** — how runtime elements map to deployment units.

The primary lens is the **C&C viewpoint** because runtime interaction between the match session and clients dominates behaviour. A supporting **class-level decomposition view** (Module viewpoint) covers the `core.sim` package, where deterministic simulation logic lives. Allocation is covered by `architecture-spec-arc42.md`.

## 3. Components, connectors, configurations

Following the Week 3 vocabulary:

- A **component** is a unit of computation with explicit interfaces.
- A **connector** is a runtime channel that carries interaction between components.
- A **configuration** is a topology of component instances wired through connectors.

### Connectors

| Connector | Realisation |
| --- | --- |
| WebSocket request/response | Uplink `InputFrame`, `AbilityRequest`, `ChatMessage`, `AuthRequest` |
| Event broadcast | `MatchSession.broadcast(...)` pushing `WorldSnapshot`, `GameEvent`, `KillFeedEntry`, `MatchEnd` |
| In-process method call | Calls between `GameServerHandler`, `MatchManager`, `MatchSession`, and `GameWorld` inside the JVM |

### Canonical configuration (MVP)

- 2 to 4 clients on Wi-Fi or LAN.
- 1 server process.
- 1 active `MatchSession` per `Match`.
- 1 `Arena` per match.
- `N` bot controllers (`BotController`) injected by `MatchManager` to fill empty slots when fewer than four human players join.

## 4. Quality attribute scenarios

The Week 3 template for quality attribute scenarios — *stimulus, source, environment, response, measure* — is applied to the seven attributes that drive BomberMen-X design.

| Attribute | Stimulus | Source | Environment | Response | Measure | Design choice |
| --- | --- | --- | --- | --- | --- | --- |
| Performance | Player presses move key | Local input | Active match, 4 players | Server applies input within one tick and broadcasts snapshot | < 50 ms median client-perceived latency on LAN | Fixed-step `GameWorld.tick`, snapshot delta via `Snapshotter` |
| Consistency | Two clients place bombs on the same tile in the same tick | Two human players | Active match | Server orders inputs deterministically, only one bomb resolves | Server log shows single `Bomb` instance | Server-authoritative `GameWorld#applyPlayerInputs` |
| Fairness | Modified client sends impossible input | Tampered `GameClient` | Active match | Server rejects move silently | Player position unchanged | `MovementValidator` role inside `GameWorld#applyPlayerInputs` |
| Reliability | A client disconnects mid-match | Network drop | Active match | `MatchSession` continues, slot becomes bot-controlled if configured | Match does not abort | `SessionRegistry` keep-alive + `MatchManager` re-slot |
| Maintainability | New developer adds a power-up | Engineer | Build time | Add a `Bonus` subclass and a `PowerUpType` enum entry | Single-file change | `Bonus` hierarchy in `core.world` |
| Testability | CI runs unit suite | Build agent | Maven build | `GameWorld` and `WireCodec` exercised headlessly | Test goal green on every push | `core` module has zero UI or socket dependency |
| Extensibility | New chat moderation rule | Product owner | Runtime | Swap `ProfanityFilter` implementation | No change to `ChatRouter` | Interface-based moderation seam |

## 5. Architecture Decision Records

Each ADR uses the headings recommended in the SAD lecture's architecture template.

### ADR-01 — Client-Server architecture

- **Context.** A LAN-friendly arena game with up to four players requires authoritative state to prevent cheating.
- **Decision.** Adopt a single-server topology with thin clients communicating over WebSocket.
- **Status.** Accepted, in force.
- **Consequences.** Single point of failure during a match (mitigated by short match length), simpler reconciliation, no NAT traversal burden on clients.

### ADR-02 — Server-authoritative state

- **Context.** Clients cannot be trusted with the authoritative `GameWorld`.
- **Decision.** Only the server mutates `GameWorld`; clients render `WorldSnapshot` projections.
- **Status.** Accepted.
- **Consequences.** Slightly higher perceived input latency, but tamper resistance and deterministic replay.

### ADR-03 — Component separation by responsibility

- **Context.** A monolithic match loop would entangle networking, moderation, and simulation.
- **Decision.** Separate `net`, `match`, `chat`, `auth`, `moderation`, `session`, and `core.sim` packages.
- **Status.** Accepted.
- **Consequences.** More inter-package calls but isolated unit tests and clear ownership boundaries.

### ADR-04 — Event-based downstream updates

- **Context.** Polling would waste bandwidth on a low-event tick.
- **Decision.** Use `MatchSession.broadcast` for snapshots and discrete `GameEvent`s only on state change.
- **Status.** Accepted.
- **Consequences.** Clients tolerate out-of-order arrival via `Envelope` sequence numbers; bandwidth scales with event rate.

## 6. Cross-cutting concerns

- **Server-authoritative state** — already mandated by ADR-02; enforced because no client class has a writable `GameWorld` field.
- **Validation before state change** — `GameWorld#applyPlayerInputs` checks tile walkability, bomb count limits, and ability cooldown before committing any mutation.
- **Separation of responsibilities** — package layout in section 3 makes ownership explicit; no class spans more than one of {network, match orchestration, simulation, moderation, auth}.
- **Determinism** — given the same seed and the same ordered input stream, `GameWorld` produces a byte-identical state. This invariant is guarded by `GameWorldTest#deterministicGenerationWithSameSeed` in `src/bomberman-core/src/test/java/com/bombermenx/core/sim/GameWorldTest.java`.
- **Event broadcasting** — uniformly handled by `MatchSession.broadcast`, which is the only fan-out point in the server, simplifying observability.

## 9. Risks and technical debt

- **Voice-channel moderation is open.** The `VoiceFrame` DTO exists but no pipeline analyses audio. Owner: JC.
- **Spectator mode is unpolished.** `MatchSession` accepts non-player observers but the client lacks a dedicated spectator camera. Owner: SK.
- **CodeQL has not been re-run after the Week 7 src/+infra/ restructure.** The previous clean baseline therefore no longer applies; a re-scan is scheduled before final submission. Owner: AA.
- **Persistent ranking math is deferred.** `RankingsView` shows session-only data; Elo-style aggregation is post-MVP. Owner: SK.
