# Course Context — Software Architecture and Development

This page answers the questions the defense panel is most likely to ask:
what the prototype actually is, why this subject is taught, what the
learning outcomes are, how the back end and front end relate in our
code, what techniques we used, and where multithreading lives.

> Built by team BomberMan-X · Driven by hunger.
> Team: Abhilash Anuku (AA), Simranjot Kaur (SK), Jithendra Chittomothu (JC).
> Institution: SRH University Stuttgart · M.Sc. Applied Computer Science.
> Course: Software Architecture and Development · Prof. Dr. Floriment Klinaku.

## What does "prototype" mean here?

The German Lastenheft (Prof. Steffen Becker, the original brief) asks
for an incrementally developed distributed Bomberman application. The
second-assignment specification (Dr. Klinaku) calls it the
"Bomberman Online" project and lists an MVP that must be playable —
clients connecting to a central game server, 2–4 players in one arena,
real-time bomb / movement / explosion mechanics, server-authoritative
validation, scoring and ranking at the end.

The prototype IS the running game. It is not a paper mock-up and it is
not an animation. The judging criteria are about whether the code
implements the spec correctly and whether the architecture is sound,
not whether the visuals are polished. Our prototype:

1. Boots a Java game server (`bomberman-server.jar`) that listens on a
   WebSocket and runs an authoritative game loop at 60 Hz.
2. Boots a Java desktop client (JavaFX) that connects to the server,
   shows the arena, sends inputs, receives world snapshots, and renders
   the result.
3. Allows 2–4 players (humans + bots) to play one full match end to
   end — placing bombs, destroying walls, collecting bonuses, dying,
   and seeing a ranking screen.

If the panel asks "where is the prototype" — start the server, start
the client, and play a round. That is the prototype.

## Why is this subject taught?

Software Architecture and Development sits between "I can write code"
and "I can design a system." The course exists because individual
programming skill alone does not produce systems that survive their
second feature request. The subject teaches you to make and defend
structural decisions: where state lives, who is allowed to mutate it,
how components communicate, what gets versioned, what gets isolated,
and what gets cached.

The Bomberman brief is a deliberate vehicle for that. A real-time
multiplayer game forces every hard distributed-systems problem into
view: authority over shared state, low-latency communication,
cheat-resistance, deterministic replay, graceful disconnect, and
multi-threaded concurrency. None of these are hidden in a framework.
You either have an answer or your game falls apart.

## Learning outcomes

By the end of the project the student can:

1. **Distinguish architecture from implementation.** Architecture
   decisions (Player owns Bomberman, server is authoritative,
   WebSocket is the wire) are written down separately from
   class-level code.
2. **Justify a client–server split.** Why does the server own the
   game state? Why does the client only send intent and render
   server snapshots while the server validates?
3. **Apply named design patterns from the GoF and from distributed
   systems literature** to a real problem (Factory for Bomb, Strategy
   for BotController, State machine for Match lifecycle, Observer for
   client subscriptions, Adapter for the wire codec).
4. **Pick a wire protocol** consciously: JSON over WebSocket for
   debuggability, Kryo on the roadmap once the protocol is stable.
5. **Reason about concurrency** — when to lock, when to use
   thread-safe data structures, why the simulation runs on a single
   tick thread while Netty manages multiple I/O threads.
6. **Trace requirements to code.** Every functional requirement
   (FR-XX) maps to a class. See `requirements-traceability.md`.
7. **Operate the system.** Build it, package it, run it locally, run
   it in Docker, deploy it to Cloud Run.

## Back end ↔ front end relationship

```
┌────────────────────────────┐         WebSocket (JSON envelopes)         ┌──────────────────────────────┐
│   bomberman-client (FE)    │  ────────────────────────────────────────► │   bomberman-server (BE)      │
│                            │       MOVE, BOMB_PLACE, ABILITY, CHAT      │                              │
│  JavaFX desktop client     │                                            │  Netty WebSocket gateway     │
│  - SceneRouter (FSM)       │                                            │  - WebSocketServer           │
│  - MainMenuView,           │                                            │  - GameServerHandler         │
│    LobbyView, ArenaView    │                                            │  - SessionRegistry           │
│  - ArenaRenderer (60 FPS)  │  ◄──────────────────────────────────────── │  - MatchManager              │
│  - MandalaTheme + CSS      │     SNAPSHOT (60 Hz), KILL_FEED,           │  - MatchSession (per match)  │
│  - GameClient (Netty WS)   │     MATCH_START, MATCH_END, WELCOME        │  - GameWorld (per session)   │
│                            │                                            │                              │
│  Owns: rendering, input,   │                                            │  Owns: world state, rules,   │
│  presentation only         │                                            │  validation, broadcasting    │
└────────────────────────────┘                                            └──────────────────────────────┘
            ▲                                                                          ▲
            │ depends on                                                               │ depends on
            └──────────────────────────►   bomberman-core   ◄──────────────────────────┘
                                         (shared domain model + wire DTOs +
                                          deterministic simulation primitives)
```

**Three modules, one rule:** client and server never depend on each
other. They share `bomberman-core` (the simulation, the entities, the
DTOs, the wire codec). That is the only thing they have in common.
They meet at runtime over the WebSocket. This is what keeps the system
maintainable — when one side changes, the other does not need to know.

**Who owns what?** The server owns truth. The client owns presentation.
Movement is the cleanest example: the client sends "I pressed up." The
server checks the target tile is walkable, decides if the move
happens, and broadcasts the new world state to everyone. The client
draws what the server says. If the client tried to cheat by sending
"I am now at tile (99, 99)," the server would reject it because that
tile is solid wall — or because the player is dead.

## Techniques and patterns in use

- **Authoritative server.** All state lives in `GameWorld`. Clients
  send intent, never state. See `GameWorld.applyPlayerInputs()`.
- **Deterministic simulation.** `GameWorld` takes a seed and threads
  it through every randomness call. Same seed + same input log =
  identical world states. This is the property the replay viewer
  leans on.
- **Fixed-tick loop.** `MatchSession` schedules `GameWorld.tick()` at
  60 Hz on a single-threaded executor. Snapshots are taken inside the
  tick and broadcast immediately. Tick budget is `1000 ms / 60 ≈ 16.6
  ms` — well under the actual cost.
- **WebSocket transport.** Bidirectional, low-overhead, browser-
  friendly. Netty on the server, Netty on the client.
- **JSON envelopes.** `{ v, t, seq, ts, p }`. Type-tagged envelopes
  make the protocol self-describing during debugging.
- **Domain model first.** Player, Bomberman, Arena, Tile, Bomb,
  Explosion, Bonus, Match, GameServer, Score — every spec entity is
  a real Java class. See `requirements-traceability.md`.
- **Design patterns:**
  - **Factory** — `Bonus.of(PowerUpType)` returns the typed bonus
    subclass for a wire enum value.
  - **State machine** — `Match.Status (WAITING → RUNNING →
    FINISHED)`; `GameState (LOBBY → COUNTDOWN → PLAYING →
    SUDDEN_DEATH → FINISHED)`.
  - **Strategy** — `BotController` swaps decision logic per game
    mode without touching the game world.
  - **Observer** — `MatchSession.broadcast()` pushes snapshots to
    every `ClientSession` subscribed to the match.
  - **Adapter** — `WireCodec` translates between Java DTOs and JSON
    bytes; the rest of the code never sees bytes.
  - **Façade** — `GameServer` wraps `MatchManager`, `WebSocketServer`,
    and `SessionRegistry` so callers query one object.
- **Delegation** — `Player` keeps a stable API but routes pawn-state
  calls to its owned `Bomberman` and score-state calls to its owned
  `Score`. Lets the domain model split cleanly without rewriting the
  simulation.

## Multithreading — yes, this system uses it

The Bomberman server is genuinely concurrent. Three thread pools share
the work:

1. **Netty I/O event loops (`bomb-eventloop-*`).** A pool of
   non-blocking I/O threads runs the WebSocket gateway. Each incoming
   frame is decoded on one of these threads. Created by
   `WebSocketServer`; default count is `2 × CPU cores`. Sleeping or
   doing heavy work here is forbidden — it blocks every other client.
2. **Per-match tick thread (`bx-match-<id>`).** Each running match
   has its own single-threaded scheduled executor. `MatchSession`
   creates it on `start()`, and `tick()` runs at 60 Hz exclusively
   on that thread. This is where `GameWorld.tick()` runs. Single
   thread per match means the simulation has no internal locking —
   the tick has exclusive access to the world.
3. **Shutdown hook thread (`bomb-shutdown`).** Spawned by the JVM
   when SIGTERM arrives. Drains the WebSocket server, stops the
   match manager, marks `GameServer.status = STOPPED`.

**How do the threads communicate?**

- Client input lands on a Netty I/O thread, is decoded, and the
  request is handed to the matching `MatchSession`. The session
  appends it to a per-player input slot (`world.inputFor(...)`)
  that the tick thread will read on its next iteration. The slot
  uses lock-free atomic fields; the tick thread always wins for
  state mutations.
- Snapshots flow the other way: the tick thread builds a
  `WorldSnapshot`, wraps it in an envelope, and calls
  `broadcast(env)` which writes to every connected `ClientSession`.
  The actual socket write is queued onto each session's Netty
  event loop — the tick thread never blocks on I/O.
- `CopyOnWriteArrayList` for the subscriber list lets the tick
  thread iterate while connection threads add/remove subscribers
  without locks.
- `AtomicBoolean` for `MatchSession.finished` so any thread can
  see the match-ended flag.
- `volatile` for `GameServer.status` so any thread can read the
  server lifecycle without locking.

**On the client:**

- JavaFX has a dedicated UI thread (`JavaFX Application Thread`).
  All scene-graph mutations happen there. Anything that came in over
  the WebSocket is marshalled onto it with `Platform.runLater(...)`.
- `GameClient` runs its own Netty event loop for the WebSocket
  connection. It decodes inbound snapshots and posts UI updates.
- `GamepadPoller` runs a separate poll thread (when JInput natives
  are present) so the UI thread never waits on hardware.
- The 60 FPS render loop runs on the JavaFX `AnimationTimer`, which
  is driven by the UI thread.

**Concurrency rules we follow:**

- The tick thread mutates the world; nothing else does.
- I/O threads decode and dispatch; they do not touch the world.
- The UI thread mutates the scene graph; nothing else does.
- Anything shared between threads is either immutable (DTOs,
  envelopes) or uses an atomic / concurrent collection.

## How to explain the code setup

If the panel asks "walk us through the code":

1. Open `pom.xml` at the repo root. Three modules:
   `bomberman-core`, `bomberman-server`, `bomberman-client`.
2. Open `src/bomberman-core/src/main/java/com/bombermenx/core/`.
   Show the `entity/` package (Player, Bomberman, Score, Bomb,
   Explosion, PowerUpItem) and the `world/` package (Arena, Tile,
   TileType, Bonus + subclasses).
3. Open `GameWorld.java`. Point at `tick()`, `applyPlayerInputs()`,
   `placeBomb()`, `detonate()`. This is the simulation.
4. Open `src/bomberman-server/BombServerApplication.java`. Three lines:
   wire `MatchManager`, wrap in `GameServer`, start `WebSocketServer`.
5. Open `MatchSession.java`. Show `start()` (schedules the tick),
   `tick()` (advances the world, broadcasts), and `stop()`.
6. Open `src/bomberman-client/ClientLauncher.java`. Boots JavaFX, applies
   `MandalaTheme`, opens `MainMenuView`.
7. Open `ArenaRenderer.java`. The 60 FPS render loop.
8. Open `deliverables/code-explanation/requirements-traceability.md`
   and show how every FR-XX in the spec maps to a concrete class.
