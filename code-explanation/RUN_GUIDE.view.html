# How to Run BomberMen-X (Step-by-Step + Wiring)

This is the practical guide. Section A is the run instructions. Section
B walks the wiring — which file calls which, end to end — so when the
panel asks "show me where X happens," you can open the file and
point.

## A. Run the prototype

### A.1 Prerequisites

| Tool | Version | How to check |
| --- | --- | --- |
| JDK 17 | 17.x | `java -version` |
| Maven | 3.9.x | `mvn --version` |
| Git (optional, for cloning) | any recent | `git --version` |

If Maven is not on PATH, the project has a portable copy at
`C:\Users\abhil\tools\maven\bin\mvn.cmd` (Windows). To use it for the
session:

```powershell
$env:JAVA_HOME = "C:\Program Files\RedHat\java-17-openjdk-17.0.19.0.10-1"
$env:PATH = "$env:USERPROFILE\tools\maven\bin;$env:PATH"
```

### A.2 Build everything + run tests

From the project root (`F:\Bomber Man X\BomberMan-X\`):

```
mvn -B clean test
```

Expected: **BUILD SUCCESS**, 11 tests pass (7 in core, 4 in server).

If tests fail, the project is in a bad state — don't run the server.

### A.3 Start the server

```powershell
# port 8080 may be held by Docker/WSL on the dev machine, so use 9090
$env:BX_HOST = "127.0.0.1"
$env:BX_PORT = "9090"
$env:BX_PERSISTENCE = "false"
mvn -B -pl bomberman-core,bomberman-server -am -DskipTests package
java -jar bomberman-server\target\bomberman-server.jar
```

Wait for the log line:

```
WebSocket server listening on ws://127.0.0.1:9090/ws
```

If the line never appears and you see `BindException`, the port is in
use — pick another free one with `Get-NetTCPConnection -LocalPort 9090`
and change `$env:BX_PORT`.

### A.4 Start the client (separate terminal)

```powershell
$env:JAVA_HOME = "C:\Program Files\RedHat\java-17-openjdk-17.0.19.0.10-1"
$env:PATH = "$env:USERPROFILE\tools\maven\bin;$env:PATH"

# first time only — installs bomberman-core into local .m2 so client can resolve it
mvn -B -pl bomberman-core -am -DskipTests install

# launch the JavaFX client
mvn -B -pl bomberman-client javafx:run
```

The mandala-themed main menu opens. In the SERVER field, paste
`ws://127.0.0.1:9090/ws` (or whatever your server is on). Pick a name,
click **PLAY**, and the lobby fills with bots so the match starts
quickly.

### A.5 Stop everything

- Client window: close it (X). The Netty client disconnects cleanly.
- Server: Ctrl-C in the server terminal. The shutdown hook drains
  connections and stops the match manager.

### A.6 Common issues

| Symptom | Cause | Fix |
| --- | --- | --- |
| `BindException: Address already in use` | Another process holds the port | Change `BX_PORT` to a free port |
| `Could not find artifact com.bombermenx:bomberman-core` | Local Maven cache doesn't have the latest core jar | `mvn -B -pl bomberman-core -am -DskipTests install` |
| `UnsatisfiedLinkError: no jinput-dx8_64` | Native gamepad DLL missing | Cosmetic. Game runs on keyboard. |
| Client connects but no match starts | Warmup hasn't elapsed; only one player in lobby | Wait 8 s (default `BX_WARMUP_SECONDS`); bots will fill |
| `KILL_FEED unhandled inbound type` in client log | Cosmetic. Server emits kill-feed events the renderer doesn't draw yet. | Ignore |

## B. How everything is wired — end to end

The system has three Maven modules. The dependency direction is
**core ← server, core ← client**. Server and client never depend on
each other. They meet at runtime over a WebSocket.

### B.1 What lives in each module

```
src/bomberman-core/                shared library — no I/O, no frameworks
├── entity/                    Player, Bomberman, Bomb, Explosion, PowerUpItem, Score
├── world/                     Arena, Tile, TileType, Bonus + 7 subclasses
├── sim/                       GameWorld (the 60 Hz tick), GameState, GameMode, Snapshotter
├── geom/                      TilePos, Direction
├── net/                       Envelope, MessageType, WireCodec
├── net/dto/                   InputFrame, WorldSnapshot, MatchStart, MatchEnd, ...
└── input/                     PlayerInput

src/bomberman-server/              authoritative server
├── BombServerApplication      main() — boots everything
├── GameServer                 facade carrying serverId / host / port / status
├── net/WebSocketServer        Netty WebSocket gateway
├── net/GameServerHandler      per-connection inbound handler
├── net/MetricsHandler         /metrics + /health endpoints
├── match/MatchManager         creates / starts / stops MatchSessions
├── match/MatchSession         per-match runtime: tick scheduler + broadcast
├── match/Match                domain-model match entity (status, id, times)
├── session/SessionRegistry    map of active ClientSessions
├── session/ClientSession      per-WebSocket state (player id, send queue)
├── ai/BotController           computer player
├── auth/                      AuthProvider, DevAuthProvider, GoogleAuthProvider

### B.2 The path of one keystroke (Move command)

This is the question the panel will ask. Read this top-down and you
can answer it.

1. **Player presses ↑** on the keyboard.
2. **`ArenaView`** has a `Scene.setOnKeyPressed` handler. It maps the
   key to a `Direction.UP` and asks `GameClient` to send a `MOVE`.
3. **`GameClient.send(envelope)`** — Netty client serialises the
   envelope via `WireCodec` (JSON) and writes it to the WebSocket
   frame.
4. **Over the wire** — one TCP packet with a small JSON envelope
   `{v:1, t:"MOVE", seq:N, ts:..., p:{...}}`.
5. **Server-side Netty I/O thread** receives the frame.
   **`GameServerHandler.channelRead0`** decodes via `WireCodec`,
   resolves the `ClientSession`, identifies the player.
6. **`MatchSession.applyInput(session, frame)`** deposits the
   `InputFrame` into the player's per-tick input slot
   (`GameWorld.inputFor(playerId)`). The slot is read by the tick
   thread on its next iteration. This decouples I/O from simulation.
7. **The match tick thread** (one per `MatchSession`) wakes 60 times
   a second. It calls `GameWorld.tick()`:
   - `applyPlayerInputs()` iterates every player. For the one with
     the pending MOVE: checks `Arena.isWalkable(target)`,
     `bombAt(target)`, `player.isAlive()`. If all green, calls
     `player.setPos(target)` and `player.recordStep()`. Otherwise
     the input is dropped (a no-op — the client never knows, and the
     next snapshot just doesn't reflect a move).
   - `collectPickups()` checks the new tile for a `PowerUpItem`. If
     present, calls `player.applyPowerUp(type)` → routes through the
     matching `Bonus` subclass.
   - `tickBombs()`, `detonate()`, etc. handle other state.
   - `Snapshotter.snapshot(world)` builds a `WorldSnapshot` DTO.
8. **`MatchSession.broadcast(env)`** sends the snapshot envelope to
   every subscribed `ClientSession`. Each session writes to its
   Netty channel on its own event loop, so the tick thread never
   blocks on I/O.
9. **Back at the client.** `GameClient`'s inbound handler decodes
   the `SNAPSHOT` envelope and posts the DTO to the snapshot buffer.
10. **`ArenaRenderer` (next animation frame)** reads the latest
    snapshot, interpolates the player position between the previous
    and current tile (so motion looks smooth), and draws.
11. **Player sees the Bomberman in the new tile.**

End-to-end latency on a single machine: well under 100 ms. On a LAN:
also under 100 ms. On Cloud Run in the same region: usually 50–150 ms.

### B.3 The path of one bomb (Place + Explode)

1. **Player presses SPACE.** `ArenaView` → `GameClient.send(BOMB_PLACE)`.
2. **Server** decodes, deposits into the per-player input slot.
3. **Tick thread.** `applyPlayerInputs` sees `placeBomb=true`. Guards:
   `player.canPlaceBomb()` (alive + bomb capacity > 0) and `!bombAt`.
   If OK, calls `placeBomb(player)`.
4. **`placeBomb(p)`**: creates a `Bomb` with the player's bomb power
   and a themed fuse time, adds to `bombs` list,
   `player.incrementActiveBombs()`, `player.recordBombPlaced()`.
5. **Each tick from now until the fuse expires**: `tickBombs()`
   counts `bomb.fuseTicks` down. When zero, the bomb is "primed."
6. **`detonate(bomb)`** is called for each primed bomb:
   - Creates an `Explosion` object.
   - `rayHits(bomb, Direction.UP)` walks tiles upward from the
     bomb's position. For each tile in range: if `Arena.get(tile)`
     is `DESTRUCTIBLE`, overwrite it to `FLOOR` and possibly drop a
     `PowerUpItem`. If `SOLID`, stop. If a player is on the tile and
     not shielded, kill them. If another unfused bomb is on the
     tile, prime it (chain reaction). Add tile to the explosion's
     affected list.
   - Repeat for DOWN, LEFT, RIGHT.
   - `Bomb.setDetonated(true)`, `player.decrementActiveBombs()`.
7. **`Snapshotter.snapshot()`** now sees the explosion in the
   `explosions` list and any kills in the kill feed. Builds and
   broadcasts.
8. **Client receives `SNAPSHOT` + a separate `KILL_FEED`** envelope
   per kill. The renderer draws the explosion sprite for the
   explosion's lifetime ticks and adds the kill to the HUD ticker.

### B.4 What runs on which thread

| Thread | Owner | What it does | Lock-free communication |
| --- | --- | --- | --- |
| Netty I/O event loops | server | Decode inbound frames, write outbound. Never touches `GameWorld`. | Deposits `InputFrame` into per-player slot — read by tick thread |
| Per-match tick thread (`bx-match-<id>`) | server | The 60 Hz authoritative tick. Single thread per match. The only writer of `GameWorld` state. | Reads input slots, writes outbound via `broadcast` (which queues onto each session's Netty loop) |
| Shutdown hook (`bomb-shutdown`) | server | Drains on SIGTERM | Signals state via `volatile GameServer.status` |
| JavaFX Application Thread | client | All UI mutations. Reads snapshots. | Marshalled onto via `Platform.runLater` |
| `AnimationTimer` (driven by FX thread) | client | 60 FPS render loop | Reads latest snapshot from the buffer |
| `GameClient` Netty event loop | client | WebSocket I/O | Hands incoming snapshots to the buffer |
| `GamepadPoller` thread (optional) | client | Polls JInput natives | Buffers events for FX thread to drain |

The single-writer rule on `GameWorld` is why we can do this without
explicit locks. Anything shared crosses thread boundaries through
immutable DTOs, atomic flags, or concurrent collections
(`CopyOnWriteArrayList` for subscribers, `volatile` for status flags).

### B.5 What the wire actually carries

Every WebSocket frame is one JSON envelope:

```
{ "v": 1, "t": "MOVE", "seq": 42, "ts": 1709000000000,
  "p": { "movement": "UP", "placeBomb": false, "clientTickMs": 16, "sequence": 42 } }
```

- `v` — protocol version
- `t` — message type (enum value in `MessageType.java`)
- `seq` — monotonic counter (per direction)
- `ts` — epoch millis when the sender built the envelope
- `p` — typed payload (DTO record under `core/net/dto/`)

Message types in use: `HELLO`, `WELCOME`, `JOIN`, `MOVE`,
`BOMB_PLACE`, `ABILITY`, `CHAT`, `LOBBY`, `MATCH_START`, `SNAPSHOT`,
`KILL_FEED`, `MATCH_END`, plus a handful for the optional plaza.
`WireCodec` is the only file that touches JSON bytes — everything
else talks DTOs.

### B.6 How a match starts

1. Player connects → server creates a `ClientSession`.
2. Player sends `HELLO` → server replies `WELCOME` with the assigned
   player id.
3. Player sends `JOIN` → `MatchManager` picks an existing
   `MatchSession` that's accepting players, or creates a new one.
   `MatchSession` adds the player via `GameWorld.addPlayer`.
4. `MatchSession.start()` flips `Match.Status = RUNNING`, schedules
   the tick executor, broadcasts `MATCH_START` with the seed +
   arena dims.
5. After the warmup countdown (`BX_WARMUP_SECONDS`), the bot filler
   joins the remaining slots so the lobby never sits empty.
6. The first tick runs. `GameState` flips from COUNTDOWN to PLAYING
   when `countdownTicksRemaining` hits zero.
7. Snapshots flow every tick. Inputs flow back. Match runs.
8. Match ends when one Bomberman alive OR time cap reached
   OR `MatchSession.stop()` is called externally. `MATCH_END` goes
   out, the tick executor shuts down, `Match.Status = FINISHED`.

### B.7 Where to look first if something breaks

| Symptom | First file to open |
| --- | --- |
| Server won't start | `BombServerApplication.main`, then `WebSocketServer.start` |
| Client won't connect | `GameClient.connectAsync`, look for `URI` parse / handshake errors |
| Move command not taking effect | `GameWorld.applyPlayerInputs` — log inside the guard branches |
| Bomb doesn't explode | `GameWorld.tickBombs` and `Bomb.tickFuse` |
| Explosion doesn't kill | `GameWorld.detonate` — check `Bomberman.isShielded()` |
| Bonus not applied | `GameWorld.collectPickups` and `Player.applyPowerUp` |
| Snapshot missing fields | `Snapshotter.snapshot` and the relevant DTO record |
| UI not refreshing | `ArenaView.onShown` / `AnimationTimer.handle` — confirm scheduler is running |
| Build fails after a rename | check `pom.xml` parent modules + the artifactId in each child pom |

That is the full wiring. Pair this guide with
`architecture-spec-arc42.md` (the formal arc42 spec) and
`requirements-traceability.md` (FR-XX → class → file) and you have
everything needed to defend the project.
