# Codebase Overview — Read This First

This is the entry point for anyone reading the Bomber Man X source for the first time. The codebase is small enough to fit in a single afternoon of reading, but the order matters. Read in the sequence below and the rest of the project will explain itself.

## Three-module layout

Bomber Man X is a Maven multi-module project. There are three modules and one parent. Sizes are approximate and refer to source files, not lines.

- `bomb-core` — approximately 30 source files. Pure Java 17, no I/O, no frameworks. Holds the deterministic simulation, the game configuration constants, the wire-message type registry, and the data types shared between server and client. Nothing in this module touches the network, the disk, or the screen. It is the only module with a hard "no dependencies outside the JDK" rule.
- `bomb-server` — approximately 20 source files. Java 17, Netty, WebSockets, Postgres via JDBC, Redis via Lettuce. Boots from `BombServerApplication`, accepts WebSocket connections through `WebSocketServer`, hands them to `MatchManager`, and runs each match inside a `MatchSession`. This is the authoritative tick loop at 60 Hz.
- `bomb-client` — approximately 20 source files. JavaFX 21, JInput for gamepad, a small custom particle pipeline, and the Tron-styled HUD. Boots from `ClientLauncher`, navigates scenes through `SceneRouter`, and renders the arena through `ArenaRenderer`. The age gate sits between launch and the first network connection.

## Reading order

The single best path through the source, for someone who has never opened it before, is the path below. It is not a tour of every file — it is the smallest set of reads that produces a working mental model.

1. `bomb-core` — `GameConfig`. Read this first. It is the constants table for the entire project. Grid size, tick rate, bomb timer, blast radius defaults, pickup spawn weights, match length, player count. Every other file references something from here. Twenty minutes of reading saves an hour later.
2. `bomb-core` — `MessageType`. The enum that pins the wire protocol. Every WebSocket frame is one of these. If you know the values in this enum, you know the surface area between server and client.
3. `bomb-core/sim/GameWorld`. The deterministic tick loop. Takes a seed and a stream of player inputs and produces a stream of world states. No randomness outside the seed. No I/O. This is where the "replay from seed plus inputs" guarantee lives. If you change anything in this file, run the replay test before you commit.
4. `bomb-server/BombServerApplication`. The `main` method of the server. Wires the Netty bootstrap, the Postgres connection pool, and the Redis client. Short file. Read it for the lifecycle.
5. `bomb-server/WebSocketServer`. The connection accept loop. Decodes incoming frames into `MessageType` instances and hands them upstream.
6. `bomb-server/MatchManager`. The router. Decides which `MatchSession` an incoming player belongs to. Spins up new sessions when needed. Tears down idle ones.
7. `bomb-server/MatchSession`. The per-match container. Owns one `GameWorld`, one input queue, and one outbound broadcast channel. The 60 Hz tick runs here.
8. `bomb-client/ClientLauncher`. The `main` method of the client. Boots JavaFX, instantiates `SceneRouter`, gates entry behind the age gate.
9. `bomb-client/SceneRouter`. The scene state machine. Menu, lobby, arena, post-match. Holds the active WebSocket connection.
10. `bomb-client/ArenaRenderer`. The 60 FPS render loop. Reads world state from the network, draws the grid, the players, the bombs, the particles, the scanlines, and the HUD.

That is the full path. Ten files. Read in that order, the rest of the codebase is annotations on this skeleton.

## Common questions

**Where does a match start?** A client opens a WebSocket to the server. `WebSocketServer` accepts the connection. `MatchManager` either places the player in an existing `MatchSession` or creates a new one. Once enough players are seated, `MatchSession` constructs a `GameWorld` with a fresh seed and starts the 60 Hz tick.

**Where does a bomb explode?** Inside `GameWorld`, on the tick where the bomb's fuse expires. The explosion mutates the world state, schedules chained bombs, and emits events that the server broadcasts to every client in the match. No client-side authority on this — the server is the source of truth.

**How is the simulation deterministic?** `GameWorld` takes a seed at construction and threads it through every randomness call. Given the same seed and the same ordered input log, the same world states come out. This is the property the (planned) replay viewer leans on.

**Where does the age gate live?** In `bomb-client/ClientLauncher` before `SceneRouter` is constructed. The gate refuses to advance until a date-of-birth check passes. There is no server-side enforcement today — see the prescriptive plan for the COPPA and Play Console follow-ups.

**Where does Postgres get used?** Inside `bomb-server`, for the (currently stubbed) leaderboard reads and for the audit log on match completion. The connection pool is configured in `BombServerApplication`.

**Where does Redis get used?** Inside `bomb-server`, for the match-discovery cache and for rate-limiting on new-connection floods. Lettuce is the client.

**Why JSON on the wire?** Debuggability. The decision log records that a binary protocol (Kryo) is on the roadmap once `MessageType` has been stable for two weeks.

**Where do I run the tests?** `mvn verify` at the repository root runs everything. Inside a single module, `mvn -pl bomb-core verify`.

**Where is the deployment configured?** `.github/workflows/deploy-cloudrun.yml`. The release-signing trust chain is in `release.yml`. The nightly soak is in `nightly.yml`. The CodeQL scan is in `codeql.yml`.

**What runs in Docker locally?** `docker compose up` starts the server, Postgres, and Redis. The JavaFX client runs on the host, not in a container.

**Who do I ask?** The three architects: AA, SK, JC. Cross-module changes need approval from all three. Single-module changes need one.
