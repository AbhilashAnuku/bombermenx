# Systems Architecture ŌĆö terminology, code paths, 3-way split

The Lastenheft (Prof. Becker) and the requirements specification
(Dr. Klinaku) both ask for clientŌĆōserver architecture, server
authority, a deterministic real-time game loop, validated input,
and broadcastable state. The systems below are the named pieces
that satisfy those asks. Each one carries its definition, the
files that implement it, and which student is the day-to-day
owner. All three of us know all twelve ŌĆö the table just records
who does the most touching.

## 1. ClientŌĆōserver architecture

The desktop client never owns truth. It opens a WebSocket, sends
intent ("I pressed up"), and renders whatever the server says.
The server owns the world. This is the only architecture style
the spec allows.

**Why this matters:** A peer-to-peer Bomberman would have to do
consensus on every move. With the server as the only writer, we
write the rules in one place and validate them in one place.
Rendering is the client's job; correctness is the server's.

**Files:**
- Server side: `src/bomberman-server/src/main/java/com/bombermenx/server/net/WebSocketServer.java`,
  `GameServerHandler.java`, `BombServerApplication.java`
- Client side: `src/bomberman-client/src/main/java/com/bombermenx/client/net/GameClient.java`
- Shared transport: `src/bomberman-core/src/main/java/com/bombermenx/core/net/Envelope.java`,
  `MessageType.java`

Primary: AA. Co-reviewers: JC, SK.

## 2. Server-authoritative state model

`GameWorld` is the only place player positions, bomb timers, and
explosion damage actually mutate. The client never modifies
positions locally at all ŌĆö it only draws the latest server
snapshot. When a
client sends `MOVE`, the server checks: is the target tile
walkable, is there a bomb there, is the player even alive ŌĆö and
only then commits the new position. Any rejected input is a
no-op.

**Why this matters:** Bomberman is a fairness game. If a client
could lie about its position, the whole thing falls apart.
Authority on one side ends the argument.

**Files:**
- `src/bomberman-core/src/main/java/com/bombermenx/core/sim/GameWorld.java` (`applyPlayerInputs`,
  `placeBomb`, `detonate`)
- `src/bomberman-server/src/main/java/com/bombermenx/server/match/MatchSession.java` (drives `tick()`)

Primary: JC. Co-reviewers: AA, SK.

## 3. Session management

A `MatchSession` owns one match. It holds the per-match game
world, the list of subscribers (humans + bots), the scheduled
tick executor, and the lifecycle flags. `MatchManager` decides
which session a connecting player joins. `ClientSession` carries
the per-connection state (player id, display name, current match
id, send queue).

**Why this matters:** Matches live and die independently. A bug
in one match cannot crash another. The session is also the unit
of cleanup ŌĆö when it ends, every subscriber gets a `MATCH_END`
and the tick thread exits.

**Files:**
- `src/bomberman-server/.../match/MatchSession.java`, `Match.java`,
  `MatchManager.java`
- `src/bomberman-server/.../session/SessionRegistry.java`, `ClientSession.java`

Primary: AA. Co-reviewers: JC, SK.

## 4. Wire protocol + envelopes

Every byte between server and client is a JSON envelope:
`{ v, t, seq, ts, p }`. `v` is the protocol version, `t` is the
`MessageType` enum value, `seq` is a monotonic counter, `ts` is
epoch millis, `p` is the typed payload (a record under
`src/bomberman-core/.../net/dto/`). `WireCodec` is the only file that
serialises or deserialises ŌĆö nothing else in the codebase touches
JSON bytes.

**Why this matters:** Type-tagged envelopes mean every frame is
self-describing in a debugger. Versioning means we can add fields
without breaking older clients. The DTOs are immutable records so
threads can pass them around without locks.

**Files:**
- `src/bomberman-core/.../net/Envelope.java`, `MessageType.java`,
  `WireCodec.java`, `dto/*.java`

Primary: AA. Co-reviewers: JC, SK.

## 5. Entity system

The domain-model entities: `Player`, `Bomberman`, `Bomb`,
`Explosion`, `PowerUpItem`. A `Player` owns one `Bomberman`
(the in-arena pawn) and one `Score` (the per-player counters).
The world holds maps and lists of these; the simulation rewrites
them every tick.

**Why this matters:** Every spec FR-XX maps to one of these
classes. See `requirements-traceability.md` for the full chart.

**Files:**
- `src/bomberman-core/.../entity/Player.java`, `Bomberman.java`,
  `Score.java`, `Bomb.java`, `Explosion.java`, `PowerUpItem.java`
- World: `.../world/Arena.java`, `Tile.java`, `Bonus.java` (+ 7 subclasses)

Primary: JC. Co-reviewers: AA, SK.

## 6. Physics + collision detection

The physics is tile-locked. A pawn occupies exactly one tile.
A move is a one-tile step in N/S/E/W. Collision is a table lookup:
`Arena.isWalkable(tile)` for terrain, `GameWorld.bombAt(tile)` for
bombs, and the bomberman position map for pawn-on-pawn. Explosion
"physics" is a 4-direction raycast from the bomb center: each ray
walks tiles outward until it hits a solid wall or runs out of
range.

**Why this matters:** Tile-locked physics is deterministic ŌĆö same
seed + same inputs = same world. Continuous physics on the server
would need locks; the tile grid lets us avoid them.

**Files:**
- `src/bomberman-core/.../sim/GameWorld.java` (`applyPlayerInputs`, `detonate`, `rayHits`)
- `src/bomberman-core/.../world/Arena.java` (`isWalkable`, `inBounds`)
- `src/bomberman-core/.../geom/TilePos.java`, `Direction.java`

Primary: JC. Co-reviewers: AA, SK.

## 7. Game-state machine

Two state machines run side by side:

- `GameState` (per game world): `LOBBY ŌåÆ COUNTDOWN ŌåÆ PLAYING ŌåÆ
  SUDDEN_DEATH ŌåÆ FINISHED`.
- `Match.Status` (per match entity): `WAITING ŌåÆ RUNNING ŌåÆ FINISHED`.

Transitions happen at well-defined points: a `MatchSession.start()`
flips `Match.Status` to RUNNING and `GameState` to COUNTDOWN.
`tick()` flips to PLAYING when the countdown hits zero. The
finish condition (one bomberman alive or the time cap) flips both
to FINISHED.

**Why this matters:** State machines make illegal transitions
impossible. You cannot place a bomb in LOBBY because
`canPlaceBomb()` checks the state.

**Files:**
- `src/bomberman-core/.../sim/GameState.java`
- `src/bomberman-server/.../match/Match.java`

Primary: JC. Co-reviewers: AA, SK.

## 8. Input handling

A frame of client input is an `InputFrame` record: a movement
direction, a place-bomb flag, an optional ability slot, a sequence
number, and a client timestamp. The client gathers input from
keyboard (`KeyEvent`) and gamepad (`GamepadPoller`), batches it
into `InputFrame`s, and ships them over the WebSocket. The server
deposits each frame into a per-player input slot
(`world.inputFor(playerId)`); the tick thread reads slots on its
next iteration and clears the one-shot flags.

**Why this matters:** Separating input gathering from input
application lets the tick run on its own schedule. The client can
send at 60 Hz, 120 Hz, or every key press ŌĆö the server still
processes one frame per slot per tick.

**Files:**
- `src/bomberman-client/.../input/GamepadPoller.java`, `HapticsService.java`
- `src/bomberman-client/.../ui/ArenaView.java` (keyboard binding)
- `src/bomberman-core/.../input/PlayerInput.java`
- `src/bomberman-core/.../net/dto/InputFrame.java`

Primary: SK. Co-reviewers: JC, AA.

## 9. Rendering system

The client renders at 60 FPS via a JavaFX `AnimationTimer` driven
by `ArenaView`. Every frame: take the latest `WorldSnapshot`
received from the server, call `ArenaRenderer.render(canvas,
snapshot, playerId)` which draws the arena floor / walls / bombs /
explosions / players / pickups in z-order straight from the
snapshot, run the particle system, apply post-effects (scanlines,
vignette). There is no client-side prediction or interpolation ŌĆö
pawns are drawn at the tile positions the server reports.

**Why this matters:** Rendering and simulation are decoupled. The
server can tick at 60 Hz while the client renders at 60, 120, or
144 FPS. The client stays a pure server-authoritative snapshot
renderer.

**Files:**
- `src/bomberman-client/.../render/ArenaRenderer.java`, `ParticleSystem.java`,
  `PostFx.java`, `CameraShake.java`
- `src/bomberman-client/.../ui/ArenaView.java` (drives the AnimationTimer)
- Theme: `MandalaTheme.java`, `MandalaArt.java`, `css/mandala.css`

Primary: SK. Co-reviewers: AA, JC.

## 10. UI / scene routing

The client UI is a small state machine: `MainMenuView ŌåÆ
LobbyView ŌåÆ ArenaView ŌåÆ RankingsView`. `SceneRouter` swaps the
root node of the JavaFX `Stage` when a view requests a transition.
Each view implements `onShown()` (connect, start polling) and
`onHidden()` (disconnect, stop polling) so resource lifetimes
match the UI.

**Files:**
- `src/bomberman-client/.../ui/SceneRouter.java`, `MainMenuView.java`,
  `LobbyView.java`, `ArenaView.java`, `RankingsView.java`

Primary: SK. Co-reviewers: AA, JC.

## 11. Mandala theme + visual identity

The V─üyu (cool wind/sky) vs Agni (warm fire/heat) palette lives
in `MandalaTheme.java`. The CSS counterpart is `mandala.css`. The
8-fold rotational mandala backdrop on the menu and lobby screens
is drawn programmatically in `MandalaArt.java` ŌĆö JavaFX Canvas
primitives only, no PNG or SVG assets, so the runtime stays
Java-only per the Lastenheft. Resize the window and the mandala
redraws to fit.

**Files:**
- `src/bomberman-client/.../ui/MandalaTheme.java`, `MandalaArt.java`
- `src/bomberman-client/src/main/resources/css/mandala.css`

Primary: SK. Co-reviewers: AA, JC.

## 12. AI bot + matchmaking

`BotController` plays a Bomberman with no human at the controller.
The matchmaker (`MatchManager`) fills empty seats with bots so a
solo player never waits. Bots run inside the same tick thread as
the human inputs so the simulation stays deterministic ŌĆö the bot
"thinks" between ticks, never during one.

**Files:**
- `src/bomberman-server/.../ai/BotController.java`
- `src/bomberman-server/.../match/MatchManager.java`

Primary: JC. Co-reviewers: AA, SK.

Not exact thirds, but close ŌĆö and on every system the other two
