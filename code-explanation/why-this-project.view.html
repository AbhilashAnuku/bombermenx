<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Why this project — BomberMen-X</title>
<link rel="stylesheet" href="../assets/viewer.css"/>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
<main class="viewer">
  <nav class="crumbs">
    <a href="../index.html">Portal</a>
    <span class="sep">·</span>
    <span>Why this project</span>
  </nav>
  <article id="content">Loading…</article>
</main>
<script src="../assets/md-render.js"></script>
<script>
  fetch("why-this-project.md").then(r => r.text()).then(md => {
    document.getElementById("content").innerHTML = window.renderMarkdown(md);
    if (window.mermaid) {
      window.mermaid.initialize({ startOnLoad: false, theme: "dark" });
      window.mermaid.run({ querySelector: "#content .mermaid" });
    }
  });
</script>
</body>
</html>
