<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #1a1d24; }
    .title { font-weight: 700; font-size: 22px; fill: #1a1d24; }
    .ttl { font-weight: 700; font-size: 14px; fill: #1a1d24; }
    .sub { font-size: 12px; fill: #5a626e; }
    .edge { font-size: 12px; fill: #3a3f47; }
    .grp { font-weight: 700; font-size: 13px; letter-spacing: 1.2px; fill: #6a6f78; }
    .conn { fill: none; stroke: #5a626e; stroke-width: 1.6; }
  </style>
  <title id="title">UML Activity Diagram — Match Lifecycle</title>
  <desc id="desc">Match lifecycle: matchmaking, seed arena, tick loop (input, sim, snapshot, broadcast, end check), end and return to lobby.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#5a626e"/></marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%"><feDropShadow stdDeviation="1" dx="0" dy="1" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <rect x="0" y="0" width="1200" height="1000" fill="#ffffff"/>
  <rect x="24" y="24" width="1152" height="952" rx="10" fill="#fdfdfb" stroke="#d6dae0" stroke-width="1.5"/>

  <text x="60" y="68" class="title">UML Activity Diagram — Match Lifecycle</text>
  <text x="60" y="92" class="sub">Server-side perspective · matchmaking · 20 Hz tick loop · end-condition · cleanup</text>

  <!-- 3 columns: SETUP x=80, TICK LOOP x=460, TEARDOWN x=860; w=260 -->

  <!-- ============ START NODE ============ -->
  <circle cx="210" cy="140" r="12" fill="#0b8a78"/>
  <text x="240" y="146" class="ttl">start</text>

  <!-- ============ SETUP column (teal) ============ -->
  <rect x="80" y="180" width="260" height="60" rx="30" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.6" filter="url(#sh)"/>
  <text x="210" y="205" text-anchor="middle" class="ttl">A1. Match queue ready</text>
  <text x="210" y="225" text-anchor="middle" class="sub">4 players or 30 s timeout</text>

  <rect x="80" y="280" width="260" height="60" rx="30" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.6" filter="url(#sh)"/>
  <text x="210" y="305" text-anchor="middle" class="ttl">A2. Allocate MatchSession</text>
  <text x="210" y="325" text-anchor="middle" class="sub">spawn GameWorld · seed RNG</text>

  <rect x="80" y="380" width="260" height="60" rx="30" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.6" filter="url(#sh)"/>
  <text x="210" y="405" text-anchor="middle" class="ttl">A3. Build Arena · spawn players</text>
  <text x="210" y="425" text-anchor="middle" class="sub">destructible blocks + bonuses</text>

  <rect x="80" y="480" width="260" height="60" rx="30" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.6" filter="url(#sh)"/>
  <text x="210" y="505" text-anchor="middle" class="ttl">A4. Broadcast MatchStart</text>
  <text x="210" y="525" text-anchor="middle" class="sub">DTO to all subscribers</text>

  <!-- ============ TICK LOOP column (pink) ============ -->
  <rect x="460" y="180" width="280" height="60" rx="30" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="600" y="205" text-anchor="middle" class="ttl">T1. Collect inputs</text>
  <text x="600" y="225" text-anchor="middle" class="sub">drain per-player buffers</text>

  <rect x="460" y="280" width="280" height="60" rx="30" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="600" y="305" text-anchor="middle" class="ttl">T2. Validate &amp; apply inputs</text>
  <text x="600" y="325" text-anchor="middle" class="sub">reject illegal moves</text>

  <rect x="460" y="380" width="280" height="60" rx="30" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="600" y="405" text-anchor="middle" class="ttl">T3. GameWorld.tick(50 ms)</text>
  <text x="600" y="425" text-anchor="middle" class="sub">bombs · explosions · pickups</text>

  <rect x="460" y="480" width="280" height="60" rx="30" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="600" y="505" text-anchor="middle" class="ttl">T4. Snapshotter.capture()</text>
  <text x="600" y="525" text-anchor="middle" class="sub">WorldSnapshot DTO</text>

  <rect x="460" y="580" width="280" height="60" rx="30" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="600" y="605" text-anchor="middle" class="ttl">T5. Broadcast snapshot</text>
  <text x="600" y="625" text-anchor="middle" class="sub">to all ClientSessions</text>

  <!-- Decision diamond at y=700, center x=600 -->
  <polygon points="600,680 720,740 600,800 480,740" fill="#f0e9fb" stroke="#6a4ba1" stroke-width="1.6" filter="url(#sh)"/>
  <text x="600" y="736" text-anchor="middle" class="ttl">end condition?</text>
  <text x="600" y="756" text-anchor="middle" class="sub">≤ 1 alive  OR  timeout</text>

  <!-- ============ TEARDOWN column (amber) ============ -->
  <rect x="860" y="180" width="260" height="60" rx="30" fill="#fff5dc" stroke="#b8860b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="990" y="205" text-anchor="middle" class="ttl">E1. Compute winner</text>
  <text x="990" y="225" text-anchor="middle" class="sub">last-alive · score · K/D</text>

  <rect x="860" y="280" width="260" height="60" rx="30" fill="#fff5dc" stroke="#b8860b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="990" y="305" text-anchor="middle" class="ttl">E2. Broadcast MatchEnd</text>
  <text x="990" y="325" text-anchor="middle" class="sub">winner · podium · stats</text>

  <rect x="860" y="380" width="260" height="60" rx="30" fill="#fff5dc" stroke="#b8860b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="990" y="405" text-anchor="middle" class="ttl">E3. Persist scores</text>
  <text x="990" y="425" text-anchor="middle" class="sub">JDBC write match_history</text>

  <rect x="860" y="480" width="260" height="60" rx="30" fill="#fff5dc" stroke="#b8860b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="990" y="505" text-anchor="middle" class="ttl">E4. Cleanup MatchSession</text>
  <text x="990" y="525" text-anchor="middle" class="sub">dispose · unsubscribe</text>

  <rect x="860" y="580" width="260" height="60" rx="30" fill="#fff5dc" stroke="#b8860b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="990" y="605" text-anchor="middle" class="ttl">E5. Return players → Lobby</text>
  <text x="990" y="625" text-anchor="middle" class="sub">enqueue for rematch</text>

  <!-- END NODE -->
  <circle cx="990" cy="700" r="14" fill="none" stroke="#b8860b" stroke-width="3"/>
  <circle cx="990" cy="700" r="7" fill="#b8860b"/>
  <text x="1020" y="706" class="ttl">end</text>

  <!-- ============ ARROWS / FLOW ============ -->
  <!-- start → A1 -->
  <path class="conn" d="M 210,152 V 180" marker-end="url(#arr)"/>

  <!-- A1 → A2 → A3 → A4 (column down) -->
  <path class="conn" d="M 210,240 V 280" marker-end="url(#arr)"/>
  <path class="conn" d="M 210,340 V 380" marker-end="url(#arr)"/>
  <path class="conn" d="M 210,440 V 480" marker-end="url(#arr)"/>

  <!-- A4 → T1: from A4 right (340,510) → up to lane y=140 → right → down to T1 (600,180) -->
  <path class="conn" d="M 340,510 H 400 V 140 H 600 V 180" marker-end="url(#arr)"/>
  <rect x="410" y="122" width="160" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="490" y="134" text-anchor="middle" class="edge">enter loop · 20 Hz</text>

  <!-- T1 → T2 → T3 → T4 → T5 → Diamond -->
  <path class="conn" d="M 600,240 V 280" marker-end="url(#arr)"/>
  <path class="conn" d="M 600,340 V 380" marker-end="url(#arr)"/>
  <path class="conn" d="M 600,440 V 480" marker-end="url(#arr)"/>
  <path class="conn" d="M 600,540 V 580" marker-end="url(#arr)"/>
  <path class="conn" d="M 600,640 V 680" marker-end="url(#arr)"/>

  <!-- Diamond [no] → back to T1 (left trunk at x=420, lane y=140) -->
  <path class="conn" d="M 480,740 H 420 V 160 H 460" marker-end="url(#arr)"/>
  <rect x="332" y="762" width="200" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="432" y="774" text-anchor="middle" class="edge">[no] next tick · sleep 50ms</text>

  <!-- Diamond [yes] → E1 (right trunk at x=800, lane y=140) -->
  <path class="conn" d="M 720,740 H 800 V 160 H 990 V 180" marker-end="url(#arr)"/>
  <rect x="824" y="122" width="60" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="854" y="134" text-anchor="middle" class="edge">[yes]</text>

  <!-- E1 → E2 → E3 → E4 → E5 → end -->
  <path class="conn" d="M 990,240 V 280" marker-end="url(#arr)"/>
  <path class="conn" d="M 990,340 V 380" marker-end="url(#arr)"/>
  <path class="conn" d="M 990,440 V 480" marker-end="url(#arr)"/>
  <path class="conn" d="M 990,540 V 580" marker-end="url(#arr)"/>
  <path class="conn" d="M 990,640 V 686" marker-end="url(#arr)"/>

  <!-- ============ SIDE NOTES ============ -->
  <rect x="80" y="600" width="260" height="120" rx="8" fill="#e3f1fa" stroke="#1565c0" stroke-width="1.4" filter="url(#sh)"/>
  <text x="210" y="624" text-anchor="middle" class="ttl">Tick budget</text>
  <line x1="100" y1="634" x2="320" y2="634" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="652" class="sub">·  Period: 50 ms</text>
  <text x="100" y="670" class="sub">·  Sim budget: &lt; 5 ms</text>
  <text x="100" y="688" class="sub">·  Snapshot: &lt; 2 ms</text>
  <text x="100" y="706" class="sub">·  Broadcast: &lt; 4 ms · Headroom &gt; 35 ms</text>

  <rect x="80" y="740" width="260" height="120" rx="8" fill="#fff9e6" stroke="#9c7c20" stroke-width="1.4" filter="url(#sh)"/>
  <text x="210" y="764" text-anchor="middle" class="ttl">Disconnects</text>
  <line x1="100" y1="774" x2="320" y2="774" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="792" class="sub">·  Player drop: replaced by Bot.</text>
  <text x="100" y="810" class="sub">·  Bot inputs feed the same T2.</text>
  <text x="100" y="828" class="sub">·  Match continues if ≥ 2 humans.</text>
  <text x="100" y="846" class="sub">·  Drained on SIGTERM.</text>

  <rect x="860" y="740" width="260" height="120" rx="8" fill="#fff9e6" stroke="#9c7c20" stroke-width="1.4" filter="url(#sh)"/>
  <text x="990" y="764" text-anchor="middle" class="ttl">End conditions</text>
  <line x1="880" y1="774" x2="1100" y2="774" stroke="#d6dae0" stroke-width="1"/>
  <text x="880" y="792" class="sub">·  ≤ 1 player alive → win</text>
  <text x="880" y="810" class="sub">·  10-min timer expired</text>
  <text x="880" y="828" class="sub">·  All disconnect → abort</text>
  <text x="880" y="846" class="sub">·  Server SIGTERM → drain</text>

  <!-- ============ LANE LABELS ============ -->
  <rect x="80" y="880" width="260" height="34" rx="6" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.4"/>
  <text x="210" y="903" text-anchor="middle" class="ttl">SETUP  (A1–A4)</text>

  <rect x="460" y="880" width="280" height="34" rx="6" fill="#fceaf3" stroke="#c2185b" stroke-width="1.4"/>
  <text x="600" y="903" text-anchor="middle" class="ttl">TICK LOOP  (T1–T5)</text>

  <rect x="860" y="880" width="260" height="34" rx="6" fill="#fff5dc" stroke="#b8860b" stroke-width="1.4"/>
  <text x="990" y="903" text-anchor="middle" class="ttl">TEARDOWN  (E1–E5)</text>

  <!-- Legend -->
  <rect x="80" y="930" width="1040" height="32" rx="6" fill="#ffffff" stroke="#d6dae0" stroke-width="1"/>
  <text x="100" y="950" class="sub">Rounded box = activity · Lilac diamond = decision · Open circle = start, bullseye = end · Loop returns via diamond [no] branch.</text>
</svg>
