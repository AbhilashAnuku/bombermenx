<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #1a1d24; }
    .title { font-weight: 700; font-size: 22px; fill: #1a1d24; }
    .ttl { font-weight: 700; font-size: 14px; fill: #1a1d24; }
    .sub { font-size: 12px; fill: #5a626e; }
    .edge { font-size: 12px; fill: #3a3f47; }
    .grp { font-weight: 700; font-size: 13px; letter-spacing: 1.2px; fill: #6a6f78; }
    .conn { fill: none; stroke: #5a626e; stroke-width: 1.6; }
  </style>
  <title id="title">UML Package Diagram — com.bombermenx.*</title>
  <desc id="desc">Maven modules and packages, with import dependencies. core is depended on by server and client.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="#5a626e"/></marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%"><feDropShadow stdDeviation="1" dx="0" dy="1" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <rect x="0" y="0" width="1400" height="800" fill="#ffffff"/>
  <rect x="24" y="24" width="1352" height="752" rx="10" fill="#fdfdfb" stroke="#d6dae0" stroke-width="1.5"/>

  <text x="60" y="68" class="title">UML Package Diagram — com.bombermenx.*</text>
  <text x="60" y="92" class="sub">Three Maven modules · UML «folder» packages · «import» dependencies between them</text>

  <!-- ============ CLIENT MODULE (left) ============ -->
  <!-- Folder shape: tab + body -->
  <path d="M 60,120 H 180 V 140 H 440 V 600 H 60 Z" fill="#e6f7f4" stroke="#0b8a78" stroke-width="1.6" filter="url(#sh)"/>
  <text x="250" y="160" text-anchor="middle" class="grp">bomberman-client</text>
  <text x="250" y="180" text-anchor="middle" class="sub">JavaFX desktop client</text>

  <!-- 8 child packages 2x4 -->
  <g><path d="M 80,200 H 140 V 215 H 240 V 280 H 80 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="160" y="240" text-anchor="middle" class="ttl">app</text>
     <text x="160" y="258" text-anchor="middle" class="sub">ClientLauncher</text>
     <text x="160" y="274" text-anchor="middle" class="sub">SceneRouter</text></g>

  <g><path d="M 260,200 H 320 V 215 H 420 V 280 H 260 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="340" y="240" text-anchor="middle" class="ttl">view</text>
     <text x="340" y="258" text-anchor="middle" class="sub">MainMenuView</text>
     <text x="340" y="274" text-anchor="middle" class="sub">LobbyView · ArenaView</text></g>

  <g><path d="M 80,300 H 140 V 315 H 240 V 380 H 80 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="160" y="340" text-anchor="middle" class="ttl">render</text>
     <text x="160" y="358" text-anchor="middle" class="sub">ArenaRenderer</text>
     <text x="160" y="374" text-anchor="middle" class="sub">SpriteAtlas · Camera</text></g>

  <g><path d="M 260,300 H 320 V 315 H 420 V 380 H 260 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="340" y="340" text-anchor="middle" class="ttl">fx</text>
     <text x="340" y="358" text-anchor="middle" class="sub">HudOverlay</text>
     <text x="340" y="374" text-anchor="middle" class="sub">KillFeedWidget</text></g>

  <g><path d="M 80,400 H 140 V 415 H 240 V 480 H 80 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="160" y="440" text-anchor="middle" class="ttl">input</text>
     <text x="160" y="458" text-anchor="middle" class="sub">InputController</text>
     <text x="160" y="474" text-anchor="middle" class="sub">GamepadPoller</text></g>

  <g><path d="M 260,400 H 320 V 415 H 420 V 480 H 260 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="340" y="440" text-anchor="middle" class="ttl">audio</text>
     <text x="340" y="458" text-anchor="middle" class="sub">SpatialAudio</text>
     <text x="340" y="474" text-anchor="middle" class="sub">AudioMixer</text></g>

  <g><path d="M 80,500 H 140 V 515 H 240 V 580 H 80 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="160" y="540" text-anchor="middle" class="ttl">theme</text>
     <text x="160" y="558" text-anchor="middle" class="sub">MandalaTheme</text>
     <text x="160" y="574" text-anchor="middle" class="sub">MandalaArt</text></g>

  <g><path d="M 260,500 H 320 V 515 H 420 V 580 H 260 Z" fill="#ffffff" stroke="#0b8a78" stroke-width="1.2"/>
     <text x="340" y="540" text-anchor="middle" class="ttl">net</text>
     <text x="340" y="558" text-anchor="middle" class="sub">GameClient</text>
     <text x="340" y="574" text-anchor="middle" class="sub">WSTransport</text></g>

  <!-- ============ CORE MODULE (center) ============ -->
  <path d="M 560,120 H 680 V 140 H 940 V 600 H 560 Z" fill="#e3f1fa" stroke="#1565c0" stroke-width="1.6" filter="url(#sh)"/>
  <text x="750" y="160" text-anchor="middle" class="grp">bomberman-core</text>
  <text x="750" y="180" text-anchor="middle" class="sub">Shared library (no I/O)</text>

  <g><path d="M 580,200 H 640 V 215 H 920 V 270 H 580 Z" fill="#ffffff" stroke="#1565c0" stroke-width="1.2"/>
     <text x="750" y="240" text-anchor="middle" class="ttl">domain</text>
     <text x="750" y="258" text-anchor="middle" class="sub">Bomberman · Player · Bomb · Arena · Tile · Score</text></g>

  <g><path d="M 580,290 H 640 V 305 H 920 V 360 H 580 Z" fill="#ffffff" stroke="#1565c0" stroke-width="1.2"/>
     <text x="750" y="330" text-anchor="middle" class="ttl">sim</text>
     <text x="750" y="348" text-anchor="middle" class="sub">GameWorld · TickClock · CollisionResolver</text></g>

  <g><path d="M 580,380 H 640 V 395 H 920 V 450 H 580 Z" fill="#ffffff" stroke="#1565c0" stroke-width="1.2"/>
     <text x="750" y="420" text-anchor="middle" class="ttl">dto</text>
     <text x="750" y="438" text-anchor="middle" class="sub">WorldSnapshot · MatchStart · MatchEnd</text></g>

  <g><path d="M 580,470 H 640 V 485 H 920 V 540 H 580 Z" fill="#ffffff" stroke="#1565c0" stroke-width="1.2"/>
     <text x="750" y="510" text-anchor="middle" class="ttl">net</text>
     <text x="750" y="528" text-anchor="middle" class="sub">Envelope · WireCodec · MessageType</text></g>

  <g><path d="M 580,560 H 640 V 575 H 920 V 600 H 580 Z" fill="#ffffff" stroke="#1565c0" stroke-width="1.2"/>
     <text x="750" y="592" text-anchor="middle" class="ttl">util — PlayerId · TileKind · Avatar · GameMode</text></g>

  <!-- ============ SERVER MODULE (right) ============ -->
  <path d="M 1060,120 H 1180 V 140 H 1340 V 600 H 1060 Z" fill="#fceaf3" stroke="#c2185b" stroke-width="1.6" filter="url(#sh)"/>
  <text x="1200" y="160" text-anchor="middle" class="grp">bomberman-server</text>
  <text x="1200" y="180" text-anchor="middle" class="sub">Netty + persistence</text>

  <g><path d="M 1080,200 H 1140 V 215 H 1320 V 270 H 1080 Z" fill="#ffffff" stroke="#c2185b" stroke-width="1.2"/>
     <text x="1200" y="240" text-anchor="middle" class="ttl">net</text>
     <text x="1200" y="258" text-anchor="middle" class="sub">WebSocketServer · GameServerHandler</text></g>

  <g><path d="M 1080,290 H 1140 V 305 H 1320 V 360 H 1080 Z" fill="#ffffff" stroke="#c2185b" stroke-width="1.2"/>
     <text x="1200" y="330" text-anchor="middle" class="ttl">match</text>
     <text x="1200" y="348" text-anchor="middle" class="sub">MatchManager · MatchSession</text></g>

  <g><path d="M 1080,380 H 1140 V 395 H 1320 V 450 H 1080 Z" fill="#ffffff" stroke="#c2185b" stroke-width="1.2"/>
     <text x="1200" y="420" text-anchor="middle" class="ttl">lobby</text>
     <text x="1200" y="438" text-anchor="middle" class="sub">LobbyService · ChatRouter · Filter</text></g>

  <g><path d="M 1080,470 H 1140 V 485 H 1320 V 540 H 1080 Z" fill="#ffffff" stroke="#c2185b" stroke-width="1.2"/>
     <text x="1200" y="510" text-anchor="middle" class="ttl">auth</text>
     <text x="1200" y="528" text-anchor="middle" class="sub">AuthRegistry · Session · Client</text></g>

  <g><path d="M 1080,560 H 1140 V 575 H 1320 V 600 H 1080 Z" fill="#ffffff" stroke="#c2185b" stroke-width="1.2"/>
     <text x="1200" y="592" text-anchor="middle" class="ttl">bot — BotController · BehaviourTree</text></g>

  <!-- ============ IMPORT ARROWS — 4 lanes y=240, 330, 420, 510 ============ -->
  <!-- Client → Core -->
  <path class="conn" d="M 440,240 H 580" marker-end="url(#arr)"/>
  <rect x="468" y="222" width="124" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="510" y="234" text-anchor="middle" class="edge">«import» domain</text>

  <path class="conn" d="M 440,330 H 580" marker-end="url(#arr)"/>
  <rect x="488" y="312" width="84" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="510" y="324" text-anchor="middle" class="edge">«import» dto</text>

  <path class="conn" d="M 440,420 H 580" marker-end="url(#arr)"/>
  <rect x="464" y="402" width="132" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="510" y="414" text-anchor="middle" class="edge">«import» dto · net</text>

  <path class="conn" d="M 440,510 H 580" marker-end="url(#arr)"/>
  <rect x="460" y="492" width="140" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="510" y="504" text-anchor="middle" class="edge">«import» util · net</text>

  <!-- Server → Core -->
  <path class="conn" d="M 1080,240 H 940" marker-end="url(#arr)"/>
  <rect x="970" y="222" width="92" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="234" text-anchor="middle" class="edge">«import» net</text>

  <path class="conn" d="M 1080,330 H 940" marker-end="url(#arr)"/>
  <rect x="956" y="312" width="128" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="324" text-anchor="middle" class="edge">«import» sim · dto</text>

  <path class="conn" d="M 1080,420 H 940" marker-end="url(#arr)"/>
  <rect x="956" y="402" width="132" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="414" text-anchor="middle" class="edge">«import» dto · util</text>

  <path class="conn" d="M 1080,510 H 940" marker-end="url(#arr)"/>
  <rect x="964" y="492" width="116" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="1010" y="504" text-anchor="middle" class="edge">«import» domain</text>

  <!-- Runtime WSS edge — client.net (340,580) → bottom trunk y=620 → server.net (1200,270) -->
  <path class="conn" d="M 340,580 V 620 H 1200 V 270" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <rect x="640" y="602" width="240" height="16" fill="#fdfdfb" opacity="0.95"/>
  <text x="760" y="614" text-anchor="middle" class="edge">runtime WSS (wire protocol)</text>

  <!-- Notes -->
  <rect x="60" y="650" width="640" height="100" rx="8" fill="#fff5dc" stroke="#b8860b" stroke-width="1.4" filter="url(#sh)"/>
  <text x="76" y="676" class="ttl">Dependency rule</text>
  <line x1="60" y1="686" x2="700" y2="686" stroke="#d6dae0" stroke-width="1"/>
  <text x="76" y="704" class="sub">·  core depends on NOTHING. domain + DTO + simulation + util only.</text>
  <text x="76" y="722" class="sub">·  Both client and server depend on core. Neither depends on the other.</text>
  <text x="76" y="740" class="sub">·  No cycles. WebSocket runtime arrow is wire-level, not a Maven edge.</text>

  <rect x="720" y="650" width="620" height="100" rx="8" fill="#fff9e6" stroke="#9c7c20" stroke-width="1.4" filter="url(#sh)"/>
  <text x="736" y="676" class="ttl">Build order</text>
  <line x1="720" y1="686" x2="1340" y2="686" stroke="#d6dae0" stroke-width="1"/>
  <text x="736" y="704" class="sub">1.  mvn -pl bomberman-core install   (publishes jar)</text>
  <text x="736" y="722" class="sub">2.  mvn -pl bomberman-server package (depends on core jar)</text>
  <text x="736" y="740" class="sub">3.  mvn -pl bomberman-client package (depends on core jar; no server dep)</text>
</svg>
